<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarot a Day</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Tokens ── */
:root {
  --bg:        #f7f3ec;
  --bg2:       #ede7da;
  --surface:   #ffffff;
  --border:    #c4b89a;
  --border2:   #8a7a60;
  --text:      #1a1208;
  --text2:     #3d3420;
  --text3:     #5c4f38;
  --gold:      #7a5c10;
  --gold-bg:   #f5e8c8;
  --violet:    #2d1a6b;
  --violet2:   #4a2d8a;
  --violet-bg: #ede8f8;
  --card-bg:   #fffef9;
  --card-border: #b09050;
  --back-bg:   #2a1a5e;
  --back-border: #6a4abf;
  --back-text: #d4c8f8;
  --pill-bg:   #f5e6d0;
  --pill-text: #6b3010;
  --accent:    #5c3d8a;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:        #0f0a1a;
    --bg2:       #1a1230;
    --surface:   #1e1535;
    --border:    #3d2d6a;
    --border2:   #6a50a8;
    --text:      #f0ebff;
    --text2:     #cdc0f0;
    --text3:     #a090d0;
    --gold:      #e8c870;
    --gold-bg:   #2a1f00;
    --violet:    #c8b0f8;
    --violet2:   #a080e8;
    --violet-bg: #1a1030;
    --card-bg:   #fffef9;
    --card-border: #c9a84c;
    --back-bg:   #1a0f3a;
    --back-border: #7c5cbf;
    --back-text: #c8b8f0;
    --pill-bg:   #3a1a00;
    --pill-text: #f0b070;
    --accent:    #b090f0;
  }
}

/* Manual dark mode override */
[data-theme="dark"] {
  --bg:        #0f0a1a;
  --bg2:       #1a1230;
  --surface:   #1e1535;
  --border:    #3d2d6a;
  --border2:   #6a50a8;
  --text:      #f0ebff;
  --text2:     #cdc0f0;
  --text3:     #a090d0;
  --gold:      #e8c870;
  --gold-bg:   #2a1f00;
  --violet:    #c8b0f8;
  --violet2:   #a080e8;
  --violet-bg: #1a1030;
  --card-bg:   #fffef9;
  --card-border: #c9a84c;
  --back-bg:   #1a0f3a;
  --back-border: #7c5cbf;
  --back-text: #c8b8f0;
  --pill-bg:   #3a1a00;
  --pill-text: #f0b070;
  --accent:    #b090f0;
}

[data-theme="light"] {
  --bg:        #f7f3ec;
  --bg2:       #ede7da;
  --surface:   #ffffff;
  --border:    #c4b89a;
  --border2:   #8a7a60;
  --text:      #1a1208;
  --text2:     #3d3420;
  --text3:     #5c4f38;
  --gold:      #7a5c10;
  --gold-bg:   #f5e8c8;
  --violet:    #2d1a6b;
  --violet2:   #4a2d8a;
  --violet-bg: #ede8f8;
  --card-bg:   #fffef9;
  --card-border: #b09050;
  --back-bg:   #2a1a5e;
  --back-border: #6a4abf;
  --back-text: #d4c8f8;
  --pill-bg:   #f5e6d0;
  --pill-text: #6b3010;
  --accent:    #5c3d8a;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Cormorant Garamond', Georgia, serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 1rem 5rem;
  transition: background 0.3s, color 0.3s;
}

/* ── Header ── */
header {
  width: 100%;
  max-width: 520px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 2.5rem;
}
.header-text { text-align: left; }
.site-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.2rem, 4vw, 1.7rem);
  font-weight: 400;
  letter-spacing: 0.2em;
  color: var(--gold);
  text-transform: uppercase;
}
.date-line {
  font-size: 0.82rem;
  font-style: italic;
  color: var(--text3);
  margin-top: 0.3rem;
  letter-spacing: 0.03em;
}

/* theme toggle */
.theme-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text2);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 0.75rem;
  font-family: 'Cinzel', serif;
  letter-spacing: 0.1em;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 4px;
  transition: background 0.2s, border-color 0.2s;
  white-space: nowrap;
}
.theme-btn:hover { background: var(--bg2); border-color: var(--border2); }
.theme-icon { font-size: 1rem; }

/* ── Card ── */
.card-scene {
  perspective: 1200px;
  width: 210px;
  margin: 0 auto 1.25rem;
  cursor: pointer;
}
.card-inner {
  width: 210px;
  height: 355px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.75s cubic-bezier(.4,0,.2,1);
  border-radius: 14px;
}
.card-inner.revealed { transform: rotateY(180deg); }
.face {
  position: absolute; inset: 0;
  border-radius: 14px;
  backface-visibility: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}

/* back */
.face-back {
  background: var(--back-bg);
  border: 1.5px solid var(--back-border);
  padding: 1.5rem;
}
.back-ornament { opacity: 0.65; }
.tap-label {
  font-family: 'Cinzel', serif;
  font-size: 0.55rem;
  letter-spacing: 0.22em;
  color: var(--back-text);
  margin-top: 1rem;
  text-transform: uppercase;
}

/* front */
.face-front {
  background: var(--card-bg);
  border: 1.5px solid var(--card-border);
  transform: rotateY(180deg);
  padding: 1.25rem 1rem;
  gap: 0;
}
.card-arcana {
  font-family: 'Cinzel', serif;
  font-size: 0.5rem;
  letter-spacing: 0.2em;
  color: #7a5c10;
  text-transform: uppercase;
  margin-bottom: 0.25rem;
}
.card-symbol { font-size: 3rem; margin: 0.25rem 0; }
.card-title {
  font-family: 'Cinzel', serif;
  font-size: 0.92rem;
  font-weight: 500;
  color: #2d1a6b;
  text-align: center;
  margin-bottom: 0.2rem;
  line-height: 1.2;
}
.card-keywords {
  font-size: 0.58rem;
  letter-spacing: 0.1em;
  color: #7a5c10;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 0.5rem;
}
.card-divider {
  width: 50%;
  height: 0.5px;
  background: #b09050;
  margin: 0 auto 0.55rem;
}
.reversed-pill {
  font-size: 0.52rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  background: #f5e6d0;
  color: #6b3010;
  padding: 2px 10px;
  border-radius: 20px;
  margin-bottom: 0.4rem;
  display: none;
  font-weight: 500;
}
.card-meaning {
  font-size: 0.76rem;
  color: #2d1a6b;
  text-align: center;
  line-height: 1.65;
  font-style: italic;
  padding: 0 0.25rem;
}

/* ── Flip toggle ── */
.flip-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  margin: 0 auto 2rem;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text2);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.82rem;
  letter-spacing: 0.08em;
  padding: 6px 18px;
  border-radius: 20px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, color 0.2s;
}
.flip-btn:hover { background: var(--bg2); border-color: var(--border2); color: var(--text); }
.flip-btn svg { transition: transform 0.4s; flex-shrink: 0; }
.flip-btn.active svg { transform: rotate(180deg); }

/* ── Panels ── */
.panels { width: 100%; max-width: 520px; display: flex; flex-direction: column; gap: 1.25rem; }

.panel {
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem 1.75rem;
  background: var(--surface);
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.5s ease, transform 0.5s ease, background 0.3s, border-color 0.3s;
  pointer-events: none;
}
.panel.visible { opacity: 1; transform: translateY(0); pointer-events: all; }

.panel-label {
  font-family: 'Cinzel', serif;
  font-size: 0.55rem;
  letter-spacing: 0.25em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 0.9rem;
}

/* lore panel */
.lore-section { margin-bottom: 1rem; }
.lore-section:last-child { margin-bottom: 0; }
.lore-heading {
  font-family: 'Cinzel', serif;
  font-size: 0.62rem;
  letter-spacing: 0.15em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 0.4rem;
}
.lore-text {
  font-size: 1rem;
  line-height: 1.75;
  color: var(--text2);
}
.theme-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 0.5rem;
}
.chip {
  font-size: 0.72rem;
  background: var(--violet-bg);
  color: var(--violet);
  border: 1px solid var(--border);
  padding: 3px 12px;
  border-radius: 20px;
  letter-spacing: 0.04em;
}

/* advice panel */
.advice-text {
  font-size: 1.05rem;
  line-height: 1.75;
  color: var(--text);
  font-style: italic;
}
.advice-text::before {
  content: '"';
  color: var(--gold);
  font-size: 1.4rem;
  line-height: 0;
  vertical-align: -0.3em;
  margin-right: 2px;
}
.advice-text::after {
  content: '"';
  color: var(--gold);
  font-size: 1.4rem;
  line-height: 0;
  vertical-align: -0.3em;
  margin-left: 2px;
}

/* journal prompts */
.prompt-list { list-style: none; display: flex; flex-direction: column; gap: 1rem; }
.prompt-list li { display: flex; gap: 0.75rem; align-items: flex-start; }
.prompt-num {
  font-family: 'Cinzel', serif;
  font-size: 0.62rem;
  color: var(--gold);
  margin-top: 0.3rem;
  min-width: 1.2rem;
}
.prompt-text {
  font-size: 0.98rem;
  line-height: 1.7;
  color: var(--text2);
}

/* draw btn */
.draw-btn {
  margin: 0.5rem auto 0;
  display: block;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text2);
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 10px 28px;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
}
.draw-btn:hover { background: var(--violet-bg); border-color: var(--violet2); color: var(--violet); }

@media (prefers-reduced-motion: reduce) {
  .card-inner, .panel, .flip-btn svg { transition: none; }
}
</style>
</head>
<body>

<header>
  <div class="header-text">
    <div class="site-title">Tarot a Day</div>
    <div class="date-line" id="date-line"></div>
  </div>
  <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" aria-label="Toggle light/dark mode">
    <span class="theme-icon" id="theme-icon">☀️</span>
    <span id="theme-label">Light</span>
  </button>
</header>

<!-- Card -->
<div class="card-scene" id="card-scene" onclick="toggleFlip()" title="Tap to flip" role="button" tabindex="0" aria-label="Tarot card — tap to reveal">
  <div class="card-inner" id="card-inner">
    <div class="face face-back">
      <svg class="back-ornament" width="90" height="90" viewBox="0 0 90 90" fill="none" role="img" aria-label="Decorative card back pattern">
        <circle cx="45" cy="45" r="35" stroke="#b39ddb" stroke-width="0.8"/>
        <circle cx="45" cy="45" r="22" stroke="#b39ddb" stroke-width="0.5"/>
        <line x1="45" y1="10" x2="45" y2="80" stroke="#b39ddb" stroke-width="0.5"/>
        <line x1="10" y1="45" x2="80" y2="45" stroke="#b39ddb" stroke-width="0.5"/>
        <line x1="20" y1="20" x2="70" y2="70" stroke="#b39ddb" stroke-width="0.5"/>
        <line x1="70" y1="20" x2="20" y2="70" stroke="#b39ddb" stroke-width="0.5"/>
        <polygon points="45,16 52,38 75,38 57,52 64,74 45,60 26,74 33,52 15,38 38,38"
          stroke="#c9a84c" stroke-width="0.8" fill="none"/>
      </svg>
      <div class="tap-label">Tap to reveal</div>
    </div>
    <div class="face face-front">
      <div class="card-arcana" id="card-arcana"></div>
      <div class="card-symbol" id="card-symbol"></div>
      <div class="card-title" id="card-title"></div>
      <div class="card-keywords" id="card-keywords"></div>
      <div class="card-divider"></div>
      <div class="reversed-pill" id="reversed-pill">Reversed</div>
      <div class="card-meaning" id="card-meaning-front"></div>
    </div>
  </div>
</div>

<button class="flip-btn" id="flip-btn" onclick="toggleFlip()" style="display:none" aria-label="Toggle card visibility">
  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
    <path d="M7 1v12M7 13l-3-3M7 13l3-3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <span id="flip-label">Hide card</span>
</button>

<div class="panels" id="panels">
  <!-- Lore panel -->
  <div class="panel" id="panel-lore">
    <div class="panel-label">About this card</div>
    <div class="lore-section">
      <div class="lore-heading">Symbolism &amp; imagery</div>
      <div class="lore-text" id="lore-symbolism"></div>
    </div>
    <div class="lore-section">
      <div class="lore-heading">Core themes</div>
      <div class="theme-chips" id="lore-themes"></div>
    </div>
    <div class="lore-section">
      <div class="lore-heading">In a reading</div>
      <div class="lore-text" id="lore-in-reading"></div>
    </div>
  </div>

  <!-- Advice panel -->
  <div class="panel" id="panel-advice">
    <div class="panel-label">Today's invitation</div>
    <div class="advice-text" id="advice-text"></div>
  </div>

  <!-- Journal prompts -->
  <div class="panel" id="panel-prompts">
    <div class="panel-label">Journal prompts</div>
    <ul class="prompt-list" id="prompt-list"></ul>
  </div>
</div>

<button class="draw-btn" id="draw-btn" onclick="drawRandom()" style="display:none; margin-top: 2rem;">
  Draw a different card
</button>

<script>

    symbolism:"In the Rider-Waite deck, the Fool stands at the edge of a cliff, pack over his shoulder, white rose in hand, gazing upward with a small dog at his heels. He is numbered zero — before all things, outside all sequence. The cliff represents the unknown, the rose purity of intention, and the dog both worldly instinct and the voice of caution he cheerfully ignores. His colourful coat is adorned with wheels and eagles — symbols of movement and vision.",

    advice_upright:"Something new is asking for your full, unguarded yes. Let yourself begin without needing to see the whole path first.",

  },
  {

let revealed = false;
let isDark = false;

// Detect system preference
if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
  isDark = true;
}

function applyTheme() {
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-icon').textContent = isDark ? '🌙' : '☀️';
  document.getElementById('theme-label').textContent = isDark ? 'Dark' : 'Light';
}

function toggleTheme() {
  isDark = !isDark;
  applyTheme();
}

function getDateCard() {
  const d = new Date();
  const seed = d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
  const idx = seed % CARDS.length;
  const rev = (seed % 7) < 2;
  return { card: CARDS[idx], reversed: rev };
}

function populate(card, reversed) {
  document.getElementById('card-arcana').textContent = 'Major Arcana · ' + card.num;
  document.getElementById('card-symbol').textContent = card.symbol;
  document.getElementById('card-title').textContent = card.name;
  document.getElementById('card-keywords').textContent = card.keywords;
  document.getElementById('card-meaning-front').textContent = reversed ? card.reversed : card.upright;

  const pill = document.getElementById('reversed-pill');
  pill.style.display = reversed ? 'block' : 'none';

  // Lore panel
  document.getElementById('lore-symbolism').textContent = card.symbolism;
  const chipsEl = document.getElementById('lore-themes');
  chipsEl.innerHTML = '';
  card.themes.forEach(t => {
    const span = document.createElement('span');
    span.className = 'chip';
    span.textContent = t;
    chipsEl.appendChild(span);
  });
  document.getElementById('lore-in-reading').textContent = card.in_reading;

  // Advice
  document.getElementById('advice-text').textContent = reversed ? card.advice_reversed : card.advice_upright;

  // Prompts
  const prompts = reversed ? card.prompts_reversed : card.prompts_upright;
  const ul = document.getElementById('prompt-list');
  ul.innerHTML = '';
  prompts.forEach((p, i) => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="prompt-num">${i+1}.</span><span class="prompt-text">${p}</span>`;
    ul.appendChild(li);
  });
}

function showPanels() {
  ['panel-lore','panel-advice','panel-prompts'].forEach((id, i) => {
    setTimeout(() => document.getElementById(id).classList.add('visible'), 200 + i * 250);
  });
  document.getElementById('draw-btn').style.display = 'block';
}

function hidePanels() {
  ['panel-lore','panel-advice','panel-prompts'].forEach(id => {
    document.getElementById(id).classList.remove('visible');
  });
}

function toggleFlip() {
  const inner = document.getElementById('card-inner');
  const btn = document.getElementById('flip-btn');
  const label = document.getElementById('flip-label');

  if (!revealed) {
    revealed = true;
    inner.classList.add('revealed');
    btn.style.display = 'flex';
    label.textContent = 'Hide card';
    btn.classList.add('active');
    showPanels();
  } else {
    const isShowing = inner.classList.contains('revealed');
    if (isShowing) {
      inner.classList.remove('revealed');
      label.textContent = 'Reveal card';
      btn.classList.remove('active');
      hidePanels();
    } else {
      inner.classList.add('revealed');
      label.textContent = 'Hide card';
      btn.classList.add('active');
      showPanels();
    }
  }
}

function drawRandom() {
  revealed = false;
  const inner = document.getElementById('card-inner');
  inner.classList.remove('revealed');
  document.getElementById('flip-btn').style.display = 'none';
  document.getElementById('flip-btn').classList.remove('active');
  hidePanels();
  document.getElementById('draw-btn').style.display = 'none';
  const idx = Math.floor(Math.random() * CARDS.length);
  const rev = Math.random() < 0.25;
  populate(CARDS[idx], rev);
}

// Keyboard support for card
document.getElementById('card-scene').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleFlip(); }
});

// Init
applyTheme();
const d = new Date();
document.getElementById('date-line').textContent = d.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
const { card, reversed } = getDateCard();
populate(card, reversed);
</script>
