<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231e0f52'/%3E%3Ctext y='82' font-size='66' x='50' text-anchor='middle'%3E%F0%9F%8C%99%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231e0f52'/%3E%3Ctext y='82' font-size='66' x='50' text-anchor='middle'%3E%F0%9F%8C%99%3C/text%3E%3C/svg%3E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tarot">
<meta name="theme-color" content="#1e0f52">
<link rel="manifest" href="/manifest.json">
<title>Tarot a Day</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[data-theme="light"]{
  --bg:#f0ece3;--bg2:#e4dfd5;--surface:#faf8f4;--border:#bdb5a6;
  --text:#1c1812;--text2:#2e2a22;--text3:#4a4438;
  --label:#5a3e00;--gold:#5a3e00;
  --chip-text:#1e0f52;--chip-bg:#ddd6f5;--chip-border:#bbaee8;
  --card-bg:#1e0f52;--card-front-text:#f0ebff;--card-front-sub:#c8b8f8;
  --card-border:#3d2d8a;--card-keyword:#b0a0e8;--card-divider:#4a3a9a;--card-meaning-color:#d8d0f8;
  --back-bg:#f5f0e8;--back-border:#a08040;--back-ornament:#7a5c20;--back-text:#4a3800;
  --pill-bg:#ffe8d0;--pill-text:#6b2800;
  --draw-border:#5a3e00;--draw-text:#5a3e00;--draw-hover-bg:#f5e8c5;
  --tab-active-bg:#1e0f52;--tab-active-text:#f0ebff;--tab-bg:#e8e2f8;--tab-text:#1e0f52;
  --grid-card-bg:#1e0f52;--grid-card-text:#f0ebff;--grid-card-sub:#b0a0e8;--grid-card-border:#3d2d8a;
  --corr-bg:#f5f0e8;--corr-border:#bdb5a6;--corr-text:#2e2a22;--corr-label:#5a3e00;
  --overlay-bg:#f0ece3;
}
[data-theme="dark"]{
  --bg:#0d0a16;--bg2:#160f28;--surface:#1a1230;--border:#3a2d60;
  --text:#f2eeff;--text2:#d8d0f0;--text3:#b0a4d8;
  --label:#e8d080;--gold:#e8d080;
  --chip-text:#e0d4ff;--chip-bg:#2a1f50;--chip-border:#5040a0;
  --card-bg:#fffef8;--card-front-text:#1e0f52;--card-front-sub:#4a3800;
  --card-border:#c9a84c;--card-keyword:#6a4800;--card-divider:#a08040;--card-meaning-color:#2d1a6b;
  --back-bg:#1a0f38;--back-border:#7c5cbf;--back-ornament:#b39ddb;--back-text:#d4c8f8;
  --pill-bg:#3a1800;--pill-text:#ffb870;
  --draw-border:#b0a0e0;--draw-text:#d0c4f8;--draw-hover-bg:#2a1f50;
  --tab-active-bg:#c8b0f8;--tab-active-text:#0d0a16;--tab-bg:#2a1f50;--tab-text:#d0c4f8;
  --grid-card-bg:#fffef8;--grid-card-text:#1e0f52;--grid-card-sub:#6a4800;--grid-card-border:#c9a84c;
  --corr-bg:#1e1535;--corr-border:#3a2d60;--corr-text:#d8d0f0;--corr-label:#e8d080;
  --overlay-bg:#0d0a16;
}
body{background:var(--bg);color:var(--text);font-family:'Sora',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1.25rem 5rem;transition:background .3s,color .3s}
header{width:100%;max-width:560px;display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem}
.site-title{font-family:'Fraunces',serif;font-size:clamp(1.5rem,5vw,2rem);font-weight:600;font-style:italic;color:var(--text);line-height:1.1}
.date-line{font-size:0.78rem;color:var(--text3);margin-top:.3rem}
.icon-btn{background:var(--surface);border:1.5px solid var(--border);color:var(--text2);border-radius:24px;padding:6px 14px;font-family:'Sora',sans-serif;font-size:0.72rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s;white-space:nowrap;margin-top:4px}
.icon-btn:hover{background:var(--bg2)}
.tabs{width:100%;max-width:560px;display:flex;gap:8px;margin-bottom:2rem}
.tab{flex:1;padding:9px 0;font-family:'Sora',sans-serif;font-size:0.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;background:var(--tab-bg);color:var(--tab-text);transition:background .2s,color .2s}
.tab.active{background:var(--tab-active-bg);color:var(--tab-active-text);border-color:transparent}
#view-daily{width:100%;max-width:560px;display:flex;flex-direction:column;align-items:center}
.card-scene{perspective:1200px;width:220px;cursor:pointer;margin:0 auto}
.card-inner{width:220px;height:370px;position:relative;transform-style:preserve-3d;transition:transform .75s cubic-bezier(.4,0,.2,1);border-radius:16px}
.card-inner.revealed{transform:rotateY(180deg)}
.face{position:absolute;inset:0;border-radius:16px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
.face-back{background:var(--back-bg);border:2px solid var(--back-border);padding:1.5rem}
.back-tap{font-family:'Sora',sans-serif;font-size:0.62rem;font-weight:500;letter-spacing:.18em;color:var(--back-text);margin-top:1.1rem;text-transform:uppercase}
.face-front{background:var(--card-bg);border:2px solid var(--card-border);transform:rotateY(180deg);padding:1.75rem 1.1rem 1.25rem;flex-direction:column;align-items:center;justify-content:flex-start}
.card-arcana{font-family:'Sora',sans-serif;font-size:0.52rem;font-weight:600;letter-spacing:.2em;color:var(--card-front-sub);text-transform:uppercase;margin-bottom:.5rem;text-align:center;width:100%}
.card-symbol{font-size:2.8rem;margin:.2rem 0 .45rem;line-height:1}
.card-title{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:600;color:var(--card-front-text);text-align:center;margin-bottom:.3rem;line-height:1.2;width:100%}
.card-keywords{font-family:'Sora',sans-serif;font-size:0.56rem;font-weight:500;letter-spacing:.05em;color:var(--card-keyword);text-align:center;margin-bottom:.65rem;width:100%}
.card-divider{width:40px;height:1.5px;background:var(--card-divider);margin:0 auto .65rem;border-radius:2px}
.reversed-pill{font-family:'Sora',sans-serif;font-size:0.52rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;background:var(--pill-bg);color:var(--pill-text);padding:2px 10px;border-radius:20px;margin-bottom:.45rem;display:none}
.card-meaning{font-family:'Fraunces',serif;font-size:0.78rem;font-style:italic;font-weight:300;color:var(--card-meaning-color);text-align:center;line-height:1.65;padding:0 .2rem;width:100%}
.card-controls{display:flex;gap:10px;margin:1.1rem 0 .25rem;justify-content:center;align-items:center;min-height:36px;flex-wrap:wrap}
.ctrl-btn{background:var(--surface);border:1.5px solid var(--border);color:var(--text2);border-radius:20px;padding:6px 16px;font-family:'Sora',sans-serif;font-size:0.7rem;font-weight:500;cursor:pointer;transition:background .2s}
.ctrl-btn:hover{background:var(--bg2)}
.ctrl-btn.hidden-ctrl{display:none}
.panels{width:100%;max-width:560px;display:flex;flex-direction:column;gap:1.1rem;margin-top:.4rem}
.panel{border:1.5px solid var(--border);border-radius:14px;padding:1.4rem 1.6rem;background:var(--surface);opacity:0;transform:translateY(10px);transition:opacity .4s ease,transform .4s ease,background .3s,border-color .3s;pointer-events:none}
.panel.visible{opacity:1;transform:translateY(0);pointer-events:all}
.panel-label{font-family:'Sora',sans-serif;font-size:0.58rem;font-weight:600;letter-spacing:.2em;color:var(--label);text-transform:uppercase;margin-bottom:.9rem}
.corr-grid{display:grid;grid-template-columns:1fr 1fr;gap:.65rem}
.corr-item{background:var(--corr-bg);border:1px solid var(--corr-border);border-radius:10px;padding:.7rem .9rem}
.corr-label{font-family:'Sora',sans-serif;font-size:0.55rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--corr-label);margin-bottom:.2rem}
.corr-value{font-family:'Fraunces',serif;font-size:0.92rem;font-weight:500;color:var(--corr-text)}
.corr-full{grid-column:1/-1}
.num-note{font-family:'Sora',sans-serif;font-size:0.85rem;line-height:1.75;color:var(--corr-text)}
.lore-section{margin-bottom:1rem}
.lore-section:last-child{margin-bottom:0}
.lore-heading{font-family:'Sora',sans-serif;font-size:0.62rem;font-weight:600;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;margin-bottom:.4rem}
.lore-text{font-family:'Sora',sans-serif;font-size:0.88rem;line-height:1.8;color:var(--text2)}
.theme-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:.3rem}
.chip{font-family:'Sora',sans-serif;font-size:0.68rem;font-weight:500;background:var(--chip-bg);color:var(--chip-text);border:1px solid var(--chip-border);padding:3px 11px;border-radius:20px}
.advice-wrap{border-left:3px solid var(--gold);padding-left:1rem}
.advice-text{font-family:'Fraunces',serif;font-size:1.02rem;font-weight:300;font-style:italic;line-height:1.8;color:var(--text)}
.prompt-list{list-style:none;display:flex;flex-direction:column;gap:.95rem}
.prompt-list li{display:flex;gap:.8rem;align-items:flex-start}
.prompt-num{font-family:'Fraunces',serif;font-size:.95rem;font-weight:500;color:var(--label);min-width:1.2rem;flex-shrink:0;padding-top:1px}
.prompt-text{font-family:'Sora',sans-serif;font-size:0.86rem;line-height:1.8;color:var(--text2)}
#view-browse{width:100%;max-width:560px;display:none;flex-direction:column}
.suit-section{margin-bottom:2rem}
.suit-title{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:600;font-style:italic;color:var(--text);margin-bottom:.7rem;padding-bottom:.45rem;border-bottom:1px solid var(--border)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:.55rem}
.grid-card{background:var(--grid-card-bg);border:1.5px solid var(--grid-card-border);border-radius:10px;padding:.65rem .45rem;cursor:pointer;text-align:center;transition:transform .15s,box-shadow .15s}
.grid-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.15)}
.grid-card-symbol{font-size:1.5rem;margin-bottom:.25rem}
.grid-card-name{font-family:'Fraunces',serif;font-size:0.68rem;font-weight:500;color:var(--grid-card-text);line-height:1.2;margin-bottom:.15rem}
.grid-card-sub{font-family:'Sora',sans-serif;font-size:0.55rem;color:var(--grid-card-sub)}
#detail-overlay{display:none;position:fixed;inset:0;background:var(--overlay-bg);z-index:100;overflow-y:auto;padding:1.5rem 1.25rem 4rem;transition:background .3s}
.detail-inner{max-width:560px;margin:0 auto;display:flex;flex-direction:column;align-items:center}
.back-btn{align-self:flex-start;margin-bottom:1.5rem;background:var(--surface);border:1.5px solid var(--border);color:var(--text2);border-radius:20px;padding:7px 16px;font-family:'Sora',sans-serif;font-size:0.72rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px}
.back-btn:hover{background:var(--bg2)}
.detail-card{background:var(--card-bg);border:2px solid var(--card-border);border-radius:16px;padding:1.75rem 1.25rem;width:100%;max-width:280px;text-align:center;margin-bottom:1.5rem;display:flex;flex-direction:column;align-items:center}
.detail-toggle-row{display:flex;gap:8px;margin-bottom:1.5rem;width:100%;max-width:280px}
.orientation-btn{flex:1;padding:8px 0;font-family:'Sora',sans-serif;font-size:0.7rem;font-weight:600;letter-spacing:.05em;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;background:var(--tab-bg);color:var(--tab-text);transition:background .2s,color .2s}
.orientation-btn.active{background:var(--tab-active-bg);color:var(--tab-active-text);border-color:transparent}
.detail-panels{width:100%;display:flex;flex-direction:column;gap:1rem}
.detail-panels .panel{opacity:1;transform:none;pointer-events:all}
@media(prefers-reduced-motion:reduce){.card-inner,.panel{transition:none}}
</style>
</head>
<body>
<header>
  <div>
    <div class="site-title">Tarot a Day</div>
    <div class="date-line" id="date-line"></div>
  </div>
  <button class="icon-btn" onclick="toggleTheme()"><span id="theme-icon">☀️</span><span id="theme-label">Light</span></button>
</header>
<div class="tabs">
  <button class="tab active" id="tab-daily" onclick="showTab('daily')">Today's Card</button>
  <button class="tab" id="tab-browse" onclick="showTab('browse')">All 78 Cards</button>
</div>
<div id="view-daily">
  <div class="card-scene" id="card-scene" onclick="toggleFlip()" role="button" tabindex="0" aria-label="Tarot card — tap to flip">
    <div class="card-inner" id="card-inner">
      <div class="face face-back">
        <svg width="90" height="90" viewBox="0 0 96 96" fill="none" aria-hidden="true">
          <circle cx="48" cy="48" r="38" stroke="var(--back-ornament)" stroke-width="1"/>
          <circle cx="48" cy="48" r="24" stroke="var(--back-ornament)" stroke-width=".6"/>
          <line x1="48" y1="10" x2="48" y2="86" stroke="var(--back-ornament)" stroke-width=".6"/>
          <line x1="10" y1="48" x2="86" y2="48" stroke="var(--back-ornament)" stroke-width=".6"/>
          <line x1="21" y1="21" x2="75" y2="75" stroke="var(--back-ornament)" stroke-width=".6"/>
          <line x1="75" y1="21" x2="21" y2="75" stroke="var(--back-ornament)" stroke-width=".6"/>
          <polygon points="48,17 55,40 79,40 61,54 68,77 48,63 28,77 35,54 17,40 41,40" stroke="var(--back-ornament)" stroke-width="1" fill="none"/>
        </svg>
        <div class="back-tap">Tap to reveal</div>
      </div>
      <div class="face face-front">
        <div class="card-arcana" id="card-arcana"></div>
        <div class="card-symbol" id="card-symbol"></div>
        <div class="card-title" id="card-title"></div>
        <div class="card-keywords" id="card-keywords"></div>
        <div class="card-divider"></div>
        <div class="reversed-pill" id="reversed-pill">Reversed</div>
        <div class="card-meaning" id="card-meaning-front"></div>
      </div>
    </div>
  </div>
  <div class="card-controls">
    <button class="ctrl-btn hidden-ctrl" id="btn-orientation" onclick="toggleOrientation()">↓ Show Reversed</button>
    <button class="ctrl-btn hidden-ctrl" id="btn-draw" onclick="drawRandom()">✦ Draw Another</button>
  </div>
  <div class="panels" id="panels">
    <div class="panel" id="panel-corr">
      <div class="panel-label">Correspondences</div>
      <div class="corr-grid" id="corr-grid"></div>
    </div>
    <div class="panel" id="panel-lore">
      <div class="panel-label">About this card</div>
      <div class="lore-section"><div class="lore-heading">Symbolism &amp; imagery</div><div class="lore-text" id="lore-symbolism"></div></div>
      <div class="lore-section"><div class="lore-heading">Core themes</div><div class="theme-chips" id="lore-themes"></div></div>
      <div class="lore-section"><div class="lore-heading">In a reading</div><div class="lore-text" id="lore-in-reading"></div></div>
    </div>
    <div class="panel" id="panel-advice">
      <div class="panel-label">Today's invitation</div>
      <div class="advice-wrap"><div class="advice-text" id="advice-text"></div></div>
    </div>
    <div class="panel" id="panel-prompts">
      <div class="panel-label">Journal prompts</div>
      <ul class="prompt-list" id="prompt-list"></ul>
    </div>
  </div>
</div>
<div id="view-browse"><div id="browse-content"></div></div>
<div id="detail-overlay">
  <div class="detail-inner">
    <button class="back-btn" onclick="closeDetail()">← Back to all cards</button>
    <div class="detail-card">
      <div class="card-arcana" id="det-arcana"></div>
      <div class="card-symbol" id="det-symbol"></div>
      <div class="card-title" id="det-title"></div>
      <div class="card-keywords" id="det-keywords"></div>
      <div class="card-divider"></div>
      <div class="reversed-pill" id="det-pill">Reversed</div>
      <div class="card-meaning" id="det-meaning"></div>
    </div>
    <div class="detail-toggle-row">
      <button class="orientation-btn active" id="det-btn-up" onclick="setDetailOrientation(false)">Upright</button>
      <button class="orientation-btn" id="det-btn-rev" onclick="setDetailOrientation(true)">Reversed</button>
    </div>
    <div class="detail-panels" id="detail-panels"></div>
  </div>
</div>
<script>

const MAJOR=[
{id:"m0",num:"0",suit:"major",name:"The Fool",symbol:"🌟",keywords:"New beginnings · Spontaneity · Leap of faith",element:"Air",astro:"Uranus",numNote:"Zero stands outside all sequence — before the journey begins, full of potential and empty of experience. It is the number of infinite possibility.",upright:"A new journey begins. Step forward with an open heart — the path reveals itself as you walk it.",reversed:"Recklessness clouds your path. Pause before leaping — something important hasn't been considered yet.",symbolism:"In the Rider-Waite deck, the Fool stands at the edge of a cliff, pack over one shoulder, white rose in hand, gazing upward while a small dog leaps at his heels. He is numbered zero — before all things. The cliff represents the unknown; the rose, purity of intention; the dog, worldly instinct and caution he cheerfully ignores.",themes:["Beginnings","Innocence","Risk","Freedom","Trust","Openness","The unknown","Play"],in_reading:"The Fool appears when a new chapter is beginning — a journey, project, relationship, or inner shift. Upright: step forward with openness. Reversed: naïveté, poor planning, or a leap taken before you're truly ready.",advice_upright:"Something new is asking for your full, unguarded yes. Let yourself begin without needing to see the whole path first.",advice_reversed:"Before you move, sit still. The impulsive choice and the courageous one feel similar — take a breath to tell them apart.",prompts_upright:["What new beginning have you been too afraid to step into? What's one small step you could take today?","Where in your life are you playing it too safe? What would you do if you knew you couldn't fail?","Think of a time you leaped into the unknown and it worked out. What did that teach you about trust?"],prompts_reversed:["Where might you be acting impulsively? What would a wiser version of you pause to consider first?","Is there a risk you're taking that doesn't feel fully aligned with your values? What's driving it?","What's one area of your life that feels chaotic? What small act of groundedness could help?"]},
{id:"m1",num:"I",suit:"major",name:"The Magician",symbol:"⚡",keywords:"Willpower · Skill · Manifestation",element:"Air",astro:"Mercury",numNote:"One is the number of will and individuality — the point from which all things emanate. It represents the self acting upon the world for the first time.",upright:"You have everything you need. Focus your intention and turn your vision into reality.",reversed:"Potential sits untapped or misused. Doubt and distraction scatter your power.",symbolism:"The Magician stands at a table bearing all four suit symbols. One hand points a wand skyward, the other toward earth: 'As above, so below.' The infinity symbol floats above his head. He does not wait for resources; he works with what is already present.",themes:["Will","Skill","Focus","Manifestation","Resourcefulness","Alchemy","Action","Power"],in_reading:"The Magician appears when all the pieces are in place — if you choose to act. Upright: you have the tools and timing — use them. Reversed: abilities squandered through distraction, or manipulation at play.",advice_upright:"Don't wait for better conditions. The resources you have right now are enough to begin.",advice_reversed:"Audit where your energy actually goes today. What you give attention to grows — is it what you chose?",prompts_upright:["What goal do you already have the skills to pursue but haven't begun? What's stopping you?","Write about a time you made something happen through sheer focus and will.","What resources — skills, relationships, tools — do you tend to undervalue?"],prompts_reversed:["Where do you feel scattered or unable to concentrate? What's pulling your focus away?","Is there a situation where you're using your abilities in a way that doesn't feel fully honest?","What would change if you truly believed you were capable of what you most want?"]},
{id:"m2",num:"II",suit:"major",name:"The High Priestess",symbol:"🌙",keywords:"Intuition · Mystery · Inner knowing",element:"Water",astro:"Moon",numNote:"Two is the number of duality and reflection — the mirror, the threshold between worlds, the pause between action and reaction. It holds space rather than fills it.",upright:"Listen beneath the noise. Answers are within you — trust what doesn't need proof.",reversed:"Your intuition is being suppressed or ignored. What do you already know that you're refusing to hear?",symbolism:"The High Priestess sits between two pillars — black Boaz and white Jachin — at the threshold of Solomon's Temple. She holds a partially hidden scroll. A pomegranate veil conceals a shimmering sea. Her blue robes flow like water; a crescent moon rests beneath her feet. She does not speak; she holds.",themes:["Intuition","Mystery","Patience","Depth","The subconscious","Receptivity","Sacred knowledge","Silence"],in_reading:"The card of knowing without explanation. Upright: calls for stillness and deep listening. Reversed: blocked intuition, secrets withheld, information concealed.",advice_upright:"You already know more than you're letting yourself know. Listen to the part of you that doesn't make arguments.",advice_reversed:"The thing you keep not-thinking-about needs your attention. Give it five quiet minutes.",prompts_upright:["What does your gut tell you about a current situation that your rational mind keeps overriding?","Describe a recurring image or quiet feeling you've been ignoring. What might it be saying?","Where do you need to sit with uncertainty rather than forcing an answer?"],prompts_reversed:["Is there something you've been actively avoiding knowing? What would happen if you let yourself see it?","Write about a time you ignored your intuition and regretted it. What would you tell yourself now?","What truths have you been hiding — from others, or from yourself?"]},
{id:"m3",num:"III",suit:"major",name:"The Empress",symbol:"🌺",keywords:"Abundance · Nurture · Creativity",element:"Earth",astro:"Venus",numNote:"Three is the number of creation — the point where two forces combine to produce a third thing entirely new. It is expression, growth, and the joy of making.",upright:"Growth and beauty flourish when tended with love. Let yourself receive as generously as you give.",reversed:"Something that needs nurturing has been neglected. Restore the well before drawing from it.",symbolism:"The Empress sits on a cushioned throne in a lush field of wheat, surrounded by evergreens and a flowing stream. She wears a crown of twelve stars and a robe of pomegranates. The Venus symbol appears on a heart-shaped shield. She creates by being, not by striving.",themes:["Fertility","Abundance","Creativity","Sensuality","Nurture","Nature","Pleasure","Receptivity"],in_reading:"The card of creative fullness and earthly abundance. Upright: slow down, trust that nurturing produces more than forcing. Reversed: creative blocks, over-giving, or care that has dried up.",advice_upright:"What would your day look like if you treated your own needs with the same generosity you offer others?",advice_reversed:"You cannot pour from an empty vessel, but you've been trying. Do one thing purely for your own restoration.",prompts_upright:["What creative project has been quietly asking for your attention? What would it look like to give it room?","Write about the ways you nurture others. Do you offer yourself the same care?","Where is abundance already present in your life that you might be taking for granted?"],prompts_reversed:["What area of your life feels barren or neglected? What has stopped you from tending to it?","Are you giving more than you're receiving? Write about where the flow feels out of balance.","What does 'enough' feel like to you? Is there something you pursue that you could simply enjoy as-is?"]},
{id:"m4",num:"IV",suit:"major",name:"The Emperor",symbol:"🏛️",keywords:"Authority · Structure · Stability",element:"Fire",astro:"Aries",numNote:"Four is the number of foundation and form — the four directions, four seasons, four elements. It is the square, the solid thing that holds its shape under pressure.",upright:"Discipline and steady leadership are your greatest assets right now. Build on solid foundations.",reversed:"Control or rigidity stifles what needs room to breathe. Where have structures become walls?",symbolism:"The Emperor sits on a stone throne carved with ram heads — Aries, the sign of leadership — holding an ankh sceptre and an orb. He is fully armoured beneath his red robes. The barren mountains behind him show that authority has shaped the terrain.",themes:["Authority","Order","Structure","Discipline","Leadership","Protection","Logic","Boundaries"],in_reading:"Asks whether your structures are serving you or constraining you. Upright: call for organisation, clear limits, decisive action. Reversed: authoritarianism, rigidity, or inability to soften.",advice_upright:"The most freeing thing you can do today might be to set one clear rule for yourself — and keep it.",advice_reversed:"Notice where you're using 'structure' as a way to avoid feeling. Some things can't be organised into order.",prompts_upright:["What area of your life would benefit from more structure? What's one concrete thing you could put in place?","Write about a time you showed real leadership — for others or for yourself.","What boundaries do you need to reinforce right now? How might they create more freedom?"],prompts_reversed:["Where are you trying to control something that isn't yours to control? What might letting go look like?","Is there a rule in your life that's outlived its usefulness? What would it feel like to release it?","Write about a situation where power feels imbalanced. What would a fair dynamic look like?"]},
{id:"m5",num:"V",suit:"major",name:"The Hierophant",symbol:"🗝️",keywords:"Tradition · Wisdom · Spiritual guidance",element:"Earth",astro:"Taurus",numNote:"Five disrupts the stability of four — it is the number of challenge, change, and the meeting of the human with the divine. It asks: what do you believe, and why?",upright:"Seek wisdom from those who've walked this path. Community and shared meaning offer real grounding.",reversed:"Question what you've been handed without examining it. The path forward may require stepping outside inherited beliefs.",symbolism:"The Hierophant sits between two pillars in religious robes, one hand raised in blessing — two fingers up, two down, the visible and the hidden. Crossed keys at his feet unlock the material and spiritual worlds. He is the bridge between the sacred and the everyday.",themes:["Tradition","Institution","Ritual","Mentorship","Community","Doctrine","Spiritual authority","Belonging"],in_reading:"Represents established wisdom. Upright: seek guidance, honour lineage. Reversed: examine what you've inherited versus what you've chosen.",advice_upright:"Seek out a teacher, a community, or a tradition that resonates. There is wisdom that can only be passed, not invented.",advice_reversed:"Not all inherited wisdom is wrong — but ask which of your beliefs were chosen and which were simply absorbed.",prompts_upright:["Who has been a true teacher or mentor in your life? What's the most important thing they showed you?","What traditions or rituals bring you a sense of meaning or belonging?","Is there wisdom you've dismissed as 'old-fashioned' that might actually have something to offer?"],prompts_reversed:["What belief were you handed — by family, culture, religion — that you've never truly questioned?","Write about a time you broke from convention. What did it cost you? What did it give you?","Where are you conforming out of fear rather than genuine alignment?"]},
{id:"m6",num:"VI",suit:"major",name:"The Lovers",symbol:"💞",keywords:"Choice · Values · Deep connection",element:"Air",astro:"Gemini",numNote:"Six is the number of harmony and integration — the union of opposites, the balance achieved after the disruption of five. It is the number of love, beauty, and reciprocity.",upright:"A meaningful choice awaits. Alignment between what you value and how you live brings harmony.",reversed:"Disharmony or an avoided decision lingers. What values are quietly in conflict within you?",symbolism:"A man and woman stand beneath the Archangel Raphael who blesses them. Behind the woman stands the Tree of Knowledge with the serpent; behind the man, the Tree of Life blazes. This is the card of alignment, of the choice that requires you to know who you are.",themes:["Choice","Love","Alignment","Values","Partnership","Duality","Desire","Integration"],in_reading:"Primarily about choice — the kind that reveals what you truly value. Upright: a moment of genuine alignment. Reversed: misalignment, shallow choices.",advice_upright:"Don't choose what looks right from the outside. Choose what is true to who you actually are.",advice_reversed:"The discomfort you feel isn't confusion. It's the signal that you know what you want but are afraid to choose it.",prompts_upright:["What decision are you weighing? Write about what each option means at the level of your values.","Describe a relationship that feels genuinely aligned. What makes it work?","Where do your head and heart point in different directions? What does each one know?"],prompts_reversed:["Is there a choice you've been avoiding? Write about what you're afraid each option might cost you.","Where do you feel inner conflict right now? What opposing parts of yourself are pulling against each other?","Write about a connection that feels out of alignment. What would it take to repair or release it?"]},
{id:"m7",num:"VII",suit:"major",name:"The Chariot",symbol:"🔱",keywords:"Determination · Triumph · Direction",element:"Water",astro:"Cancer",numNote:"Seven is the number of spiritual victory and the seeker — the mystic number of completion across many traditions. It is the prize won through sustained effort.",upright:"You have the will to overcome. Move forward — opposing forces can be harnessed, not just fought.",reversed:"Scattered direction holds you back. Choose one path clearly before pressing ahead.",symbolism:"A warrior rides a chariot drawn by two sphinxes — one black, one white — without reins, controlling them through will alone. The Chariot is about directing the full complexity of your nature toward a single point.",themes:["Drive","Control","Momentum","Willpower","Victory","Focus","Ambition","Tension harnessed"],in_reading:"Triumph through focused will, not brute force. Upright: commit and move. Reversed: aggression without direction.",advice_upright:"Stop deliberating. Pick the one thing that matters most today and give it everything.",advice_reversed:"Speed without direction is just spinning. What is the actual destination? Name it, then choose the path.",prompts_upright:["What challenge are you facing that requires sheer determination? What drives you to keep going?","Describe a time you achieved something difficult through focus. What did you learn about yourself?","What are the 'opposing forces' in your current situation? How might you work with them?"],prompts_reversed:["Where do you feel pulled in too many directions? What would it look like to pick one and commit fully?","Is there a goal you're pursuing with force rather than flow? What would a more sustainable approach feel like?","Write about a time you burned out chasing something. What signs did you ignore?"]},
{id:"m8",num:"VIII",suit:"major",name:"Strength",symbol:"🦁",keywords:"Courage · Patience · Compassionate power",element:"Fire",astro:"Leo",numNote:"Eight is the number of power, cycles, and infinity — the lemniscate turned vertical. It speaks of strength that renews itself, of effort that compounds over time.",upright:"Gentle but firm inner strength guides you. Compassion is more powerful than force.",reversed:"Self-doubt or suppressed intensity may be at work. Where are you using force when tenderness would serve better?",symbolism:"A woman calmly holds open the mouth of a lion with no fear on her face — only quiet certainty. The infinity symbol floats above her head, earned through relationship rather than command. She wears a crown of flowers. The lion is not tamed; he is understood.",themes:["Inner strength","Courage","Compassion","Patience","Resilience","Self-mastery","Gentleness","Integration of shadow"],in_reading:"The card of quiet power. Upright: you have more inner resource than you know. Reversed: self-doubt, or energy turned inward in unhealthy ways.",advice_upright:"You don't need to be louder or harder to get through this. Your steadiness is the strongest thing you have.",advice_reversed:"The part of you you've been suppressing is not the enemy. Turn toward it with curiosity instead of control.",prompts_upright:["Where in your life are you showing quiet, unacknowledged strength? Write about it.","Describe a situation that requires patience rather than force. What does that kind of courage look like for you?","Write about someone you admire for their inner strength. What quality of theirs do you want to cultivate?"],prompts_reversed:["Where are you being hard on yourself? What would you say to a close friend in the same situation?","Is there anger or resentment you've been suppressing? What does it need from you?","Write about a fear that's been limiting you. What might happen if you acknowledged it openly?"]},
{id:"m9",num:"IX",suit:"major",name:"The Hermit",symbol:"🏮",keywords:"Solitude · Introspection · Inner guidance",element:"Earth",astro:"Virgo",numNote:"Nine is the number of completion and wisdom — the last single digit, containing all that came before. It is the sage who has travelled the full journey and now holds the lamp.",upright:"The answers you need are found in stillness. Quiet reflection will light the path forward.",reversed:"Too much isolation may be stalling you — or you're refusing guidance being genuinely offered.",symbolism:"An old man stands alone at a mountain peak, holding a lantern containing the Seal of Solomon — wisdom. He leans on a staff and faces downward, illuminating the path for others. He has withdrawn in order to see more clearly.",themes:["Solitude","Wisdom","Introspection","Guidance","The inner teacher","Retreat","Patience","Soul-searching"],in_reading:"The card of deliberate withdrawal. Upright: seek your own counsel. Reversed: excessive isolation, or reluctance to accept help.",advice_upright:"The answer you've been looking for isn't in another conversation. Sit with the question alone today.",advice_reversed:"Solitude is a tool, not a permanent state. If you've been in retreat for a long time, what are you avoiding?",prompts_upright:["What question have you been carrying that you haven't yet sat quietly with? Write freely about it.","What does solitude feel like for you — restorative or uncomfortable? What do you learn from it?","What inner wisdom have you been too busy to listen to? What does your quietest self know?"],prompts_reversed:["Have you been withdrawing from something that actually needs your engagement? Explore that.","Is there guidance being offered that you've been too self-sufficient to accept?","Write about the difference between helpful solitude and avoidance. Which one describes where you are?"]},
{id:"m10",num:"X",suit:"major",name:"Wheel of Fortune",symbol:"☯️",keywords:"Cycles · Fate · Turning points",element:"Fire",astro:"Jupiter",numNote:"Ten begins a new cycle — a return to one, but at a higher level. It is completion and beginning at once, the wheel having turned a full rotation.",upright:"The wheel turns in your favour. What feels uncertain is part of a larger cycle — change is working for you.",reversed:"You may be resisting change that's natural and necessary. What would it feel like to stop pushing against the current?",symbolism:"A great wheel floats in the clouds, covered in alchemical symbols. Four winged creatures read from books at each corner. A sphinx sits atop the wheel; a serpent descends one side, Anubis ascends the other. The wheel turns; no position is permanent.",themes:["Change","Cycles","Fate","Luck","Karma","Timing","Impermanence","Opportunity"],in_reading:"Everything is in motion. Upright: often signals a positive turn — luck, opportunity, forces aligning. Reversed: resisting necessary change.",advice_upright:"Ride the current rather than exhausting yourself swimming against it. Something is turning your way.",advice_reversed:"The thing you keep fighting may be the change itself. What would it mean to let the wheel turn?",prompts_upright:["Looking at the cycles of your life, what phase do you sense you're in right now?","Write about a time when something ending led to something better. What did you learn about change?","What feels like it's shifting in your life? How are you meeting that shift?"],prompts_reversed:["Where are you fighting against change that may be inevitable? What are you most afraid of losing?","Write about a situation where things feel stuck. Is the problem the situation or your relationship to it?","What pattern in your life keeps repeating? What might it be trying to teach you?"]},
{id:"m11",num:"XI",suit:"major",name:"Justice",symbol:"⚖️",keywords:"Truth · Fairness · Cause and effect",element:"Air",astro:"Libra",numNote:"Eleven (reducing to two) is the number of the higher mirror — weighing of opposites. It asks: what is true, what is fair, what is balanced?",upright:"What is just will prevail. Act with integrity today — your choices plant seeds whose fruit you will taste.",reversed:"Dishonesty or unfairness clouds the situation. Look at your own role before assigning blame elsewhere.",symbolism:"Justice sits enthroned between two pillars, a sword in one hand — reason, clarity — and scales in the other. There is no blindfold here: this is clear-eyed, deliberate justice. She sees everything and weighs it accurately.",themes:["Truth","Fairness","Law","Accountability","Cause and effect","Clarity","Ethics","Decisions"],in_reading:"The card of honest reckoning — not punishment, but accurate accounting. Upright: a fair outcome is coming. Reversed: dishonesty, evasion, or bias distorting the picture.",advice_upright:"Before you decide, ask: what is actually true here, stripped of what I want to be true? Act from that.",advice_reversed:"There's a version of events where you're not as blameless as you've been presenting. What does that version say?",prompts_upright:["Where in your life do you feel like you're reaping what you've sown? What does that reveal?","Is there a decision facing you that has ethical weight? Write about the most honest path forward.","Write about a time justice was served. How did it feel, and what did it cost?"],prompts_reversed:["Is there a situation where you've been more focused on being right than being honest? What would accountability look like?","Where do you feel treated unfairly? Is there any part you've played that you haven't fully owned?","Write about a time you avoided a consequence you probably deserved. What did you learn?"]},
{id:"m12",num:"XII",suit:"major",name:"The Hanged Man",symbol:"🔄",keywords:"Surrender · Suspension · New perspective",element:"Water",astro:"Neptune",numNote:"Twelve (reducing to three) is the number of sacrifice and cosmic completion — the twelve months, the zodiac. It gives something up to gain something greater.",upright:"Stop forcing a solution. The most powerful act right now is to pause — a new angle reveals what action cannot.",reversed:"Unnecessary delay or stubborn refusal to let go keeps you stuck. What are you sacrificing that isn't serving anything?",symbolism:"A young man hangs upside-down from a living T-cross — the World Tree — suspended by one ankle, his expression serene, not anguished. A halo surrounds his head. He has chosen this position. The living wood suggests a threshold, not an ending.",themes:["Surrender","Pause","Reversal","Sacrifice","New perspective","Letting go","Wisdom through waiting","Liminal space"],in_reading:"The way forward requires giving something up — usually control or the urge to act. Upright: sacred pause. Reversed: unnecessary martyrdom, refusing what needs to change.",advice_upright:"The answer isn't coming through more effort. Hang there for a moment — let the blood rush to a different part of your thinking.",advice_reversed:"Not all waiting is wisdom. If you've been suspended for a long time, ask whether you're pausing or hiding.",prompts_upright:["What situation might benefit from doing absolutely nothing for a while? What makes that difficult?","Write about a belief that, if turned upside down, might actually free you.","Describe what surrender feels like to you. Is it weakness, wisdom, or something else?"],prompts_reversed:["Where are you in limbo when action is actually what's needed? What's the first step?","Is there something you're sacrificing that isn't serving any greater purpose? What would it mean to put it down?","Write about the difference between patient waiting and self-imposed paralysis. Which one is yours?"]},
{id:"m13",num:"XIII",suit:"major",name:"Death",symbol:"🌑",keywords:"Endings · Transformation · Release",element:"Water",astro:"Scorpio",numNote:"Thirteen is the number of transformation and rebirth — feared precisely because it signals the end of the familiar twelve and the beginning of the unknown. Something must die for something new to live.",upright:"Something must end for something new to begin. Release what no longer serves — transformation is already underway.",reversed:"Clinging to what's already gone blocks what's trying to arrive. Fear of endings is the only thing standing between you and renewal.",symbolism:"A skeleton in black armour rides a white horse, carrying a black flag bearing a white rose — death adorned with life. Before him, figures from every station of life. The sun sets and rises between two towers. The white rose and the rising sun speak of what survives every ending.",themes:["Endings","Transformation","Release","The inevitable","Clearing","Rebirth","Transition","Impermanence"],in_reading:"Almost never means literal death. The card of necessary endings. Upright: something is clearing to make room. Reversed: clinging to dead relationships, ideas, or old versions of yourself.",advice_upright:"Honour the ending. Don't rush past it toward the next thing — but don't drag it out either.",advice_reversed:"You know it's over. The only remaining question is how long you're willing to keep pretending it isn't.",prompts_upright:["What in your life has run its course but you're still holding on to? What would it feel like to let it go?","Describe a past ending that led to something you now value. What did the loss make possible?","What version of yourself are you in the process of leaving behind? Who are you becoming?"],prompts_reversed:["What are you refusing to let die? Write honestly about what you're afraid you'll lose.","Is there a relationship or habit that has already ended but you haven't acknowledged it?","Write about your relationship with endings in general. Where does that relationship come from?"]},
{id:"m14",num:"XIV",suit:"major",name:"Temperance",symbol:"🌊",keywords:"Balance · Patience · Integration",element:"Fire",astro:"Sagittarius",numNote:"Fourteen (reducing to five) is the number of the alchemical process — the disruption of four's stability in order to blend it into something new. It is the long work of integration.",upright:"Flow, moderation, and patience guide you now. Opposites can be blended into something richer than either alone.",reversed:"Excess or imbalance is disrupting your peace. Something has tipped too far — slow down and find your centre.",symbolism:"An angel stands with one foot on land and one in water, pouring liquid between two cups in an apparently impossible upward flow. A solar triangle glows on their chest; irises bloom at the stream's edge. The path leads to a solar crown on the horizon — the goal glimpsed through patience.",themes:["Balance","Moderation","Integration","Patience","Alchemy","Flow","Healing","Long-term vision"],in_reading:"The card of the long game — combining opposing forces slowly until something new and whole emerges. Upright: patience with the process. Reversed: imbalance, overindulgence.",advice_upright:"You're being asked to blend, not choose. The tension between two things in your life is an ingredient, not a problem.",advice_reversed:"What have you been doing too much of lately? What would the moderated version look like today?",prompts_upright:["Where in your life are you rushing something that needs time? What would patience look like in practice?","Write about two parts of yourself that feel in tension. How might they complement rather than conflict?","What does 'balance' feel like to you personally? When do you have it, and when don't you?"],prompts_reversed:["Where are you overdoing something that's starting to cost you? What's driving it?","Write about a recent moment when you felt genuinely off-balance. What tipped you?","What would a more moderate version of your daily life look like? What would you have to give up?"]},
{id:"m15",num:"XV",suit:"major",name:"The Devil",symbol:"🔗",keywords:"Shadow · Attachment · Illusion of bondage",element:"Earth",astro:"Capricorn",numNote:"Fifteen (reducing to six) is the shadow of six's harmony — the distortion of love into obsession and attachment. It asks: what are you worshipping instead of what truly matters?",upright:"Examine what you're bound to. What habits or illusions feel like needs but are keeping you small?",reversed:"The chains were never locked. You are freer than you believe — awareness is already liberation.",symbolism:"A horned, bat-winged devil squats on a half-cube — incomplete knowledge — flanked by a naked man and woman loosely chained to his plinth. The chains are large enough to slip off. They are transforming into the very thing they serve. Yet the chains are loose — they're there by choice.",themes:["Shadow","Attachment","Bondage","Illusion","The unconscious","Materialism","Addiction","Self-awareness"],in_reading:"The card of the shadow — bonds we don't notice or won't admit. Upright: honest scrutiny of what you're chained to. Reversed: awakening, chains loosening.",advice_upright:"Name the thing you keep returning to that isn't serving you. Not to condemn it — just to see it clearly.",advice_reversed:"You have more choice here than you've been acting like you do. What's one small move toward the door?",prompts_upright:["What do you keep returning to that you know isn't serving you? Write about the honest appeal it holds.","Where in your life do you feel trapped? How much of that is the situation versus your beliefs about it?","Write about your relationship with one of your shadows — the part of yourself you're most reluctant to look at."],prompts_reversed:["Write about a time you broke free from something that felt inescapable. What made freedom possible?","What story are you telling yourself that keeps you stuck? What evidence contradicts it?","Where do you feel the first stirrings of liberation? What would it take to nurture that feeling?"]},
{id:"m16",num:"XVI",suit:"major",name:"The Tower",symbol:"⚡",keywords:"Upheaval · Revelation · Sudden change",element:"Fire",astro:"Mars",numNote:"Sixteen (reducing to seven) is the number of sudden spiritual revelation — the lightning bolt that breaks through all illusion in an instant.",upright:"What's falling apart was built on an unstable foundation. The disruption clears what needs to go — stay open.",reversed:"You may be avoiding a necessary collapse. Prolonging the inevitable only delays the clearing.",symbolism:"A tall tower is struck by lightning; its crown blasted off, two figures fall from its windows. The lightning bolt is divine force — sudden, impartial, accurate. The crown flying off represents false beliefs about power and security. The figures fall toward reality, toward what's true.",themes:["Sudden change","Revelation","Upheaval","Destruction of illusion","Crisis","Liberation","Chaos","Truth"],in_reading:"Appears when something built on a false foundation is about to collapse. Upright: the change is underway. Reversed: a collapse being resisted or feared unnecessarily.",advice_upright:"Don't try to put the pieces back together the way they were. Something is clearing. Ask what it's making room for.",advice_reversed:"The crack in the wall you keep plastering over is not cosmetic. What would happen if you let it show?",prompts_upright:["What structure in your life is currently shaking or falling apart? What might have been unstable about its foundation?","Write about a past upheaval that was, in retrospect, necessary. What was revealed?","When sudden change hits, what's your instinct — to fight, flee, or lean in?"],prompts_reversed:["Is there something you've been propping up long past its natural end? What are you afraid would happen if it fell?","Write about the difference between stability and stagnation. Are you choosing security or avoidance?","What would you need to believe about yourself to trust that you could survive and rebuild from a major collapse?"]},
{id:"m17",num:"XVII",suit:"major",name:"The Star",symbol:"✨",keywords:"Hope · Renewal · Inspiration",element:"Air",astro:"Aquarius",numNote:"Seventeen (reducing to eight) is the number of hope that sustains itself — not the fleeting hope of wishful thinking but the steady, self-renewing kind that survives real darkness.",upright:"After the storm, the stars appear. Allow yourself to be replenished — hope here is earned, not naïve.",reversed:"Doubt dims your guiding light. The hope you're looking for isn't gone — it's being obscured by old stories.",symbolism:"A naked woman kneels at a pool, one foot on earth and one in water. She pours water from two jugs — nourishing both the unconscious and the material world. Above her, one large star and seven smaller ones. She is unguarded, open. This is what survives devastation.",themes:["Hope","Renewal","Healing","Vulnerability","Inspiration","Peace","Guidance","Authenticity"],in_reading:"The healing that follows collapse. Upright: let yourself be restored. Reversed: cynicism, or the refusal to let hope return after pain.",advice_upright:"Let yourself want something beautiful without immediately preparing for its failure. The hope itself is doing something.",advice_reversed:"Hope is not the same as expectation. You can hold the possibility of good things without attaching to a specific outcome.",prompts_upright:["What are you allowing yourself to hope for right now? Write about it without hedging.","Describe a moment of genuine renewal in your life. What made it possible?","What is the 'star' you navigate by — the core value that orients you even in confusing times?"],prompts_reversed:["Where have you stopped believing something good is possible for you? Where did that belief come from?","Write about a hope you gave up on that part of you still carries quietly. Is it truly gone, or just dormant?","What would you need to release — a fear, a resentment, a story — to let yourself feel hopeful again?"]},
{id:"m18",num:"XVIII",suit:"major",name:"The Moon",symbol:"🌕",keywords:"Illusion · Intuition · The unconscious",element:"Water",astro:"Pisces",numNote:"Eighteen (reducing to nine) is the number of completion approached through the dark — the full richness of nine earned by travelling through mystery rather than around it.",upright:"Reality is more layered than it appears. Your dreams and instincts carry real information — don't dismiss them.",reversed:"Confusion is beginning to lift. As fears lose their grip, clarity returns — let it, gently.",symbolism:"A full moon hangs between twin towers, casting reflected light on the landscape below. A crayfish crawls from a pool; two dogs — one domestic, one wild — howl at the moon. The path winds between the towers into the unknown distance. Everything is real and not-real at once.",themes:["Illusion","The unconscious","Dreams","Fear","Intuition","Deception","Mystery","Shadow"],in_reading:"The card of the not-quite-seen. Upright: pay attention to what you sense beneath the surface. Reversed: confusion clearing, or a deception coming to light.",advice_upright:"What you're feeling that you can't explain probably means something. Sit with it rather than talking yourself out of it.",advice_reversed:"The fog is thinning. Don't fill the clearing clarity with new stories — let it empty first and see what's there.",prompts_upright:["What feels unclear or deceptive in your life right now? What does your gut say beneath all the noise?","Write about a recurring dream, image, or feeling that keeps surfacing. What might it be trying to say?","Where are you letting a fear — one that may not even be real — run the show? What is that fear about?"],prompts_reversed:["What illusion have you recently seen through? Write about what was actually there when the fog cleared.","Describe a fear that used to feel enormous but has slowly begun to lose its power. What shifted?","Where are you starting to trust yourself more than you used to? What has made that possible?"]},
{id:"m19",num:"XIX",suit:"major",name:"The Sun",symbol:"☀️",keywords:"Joy · Vitality · Success",element:"Fire",astro:"Sun",numNote:"Nineteen (reducing to one) is the return to self — a self now illuminated, having passed through all the trials. It is the number of radiant individuality.",upright:"Warmth, clarity, and success surround you. Let yourself be seen and be joyful — today carries real light.",reversed:"A temporary cloud dims the brightness. Joy is still present; it's just quieter today.",symbolism:"A child rides a white horse beneath a radiant sun with a human face, holding a red banner. The child is unclothed — nothing hidden, nothing defended. Sunflowers bloom over a garden wall. The sun's rays alternate straight and wavy — active and passive, giving and receiving.",themes:["Joy","Clarity","Success","Vitality","Freedom","Truth","Abundance","Presence"],in_reading:"One of the most positive cards in the deck. Upright: be present for what's going well — shine rather than dim yourself. Reversed: the good is there but obscured by self-doubt.",advice_upright:"Whatever is going well right now: receive it fully. Let yourself be glad. Not every season needs to be complicated.",advice_reversed:"You're closer to joy than you feel. What one small thing today could you do just because it pleases you?",prompts_upright:["What's something in your life right now that's genuinely good — that you might be understating?","Write about a moment recently when you felt fully, unreservedly happy. What made it possible?","Where are you afraid to shine too brightly — to be too successful, too happy, too visible?"],prompts_reversed:["Write about something that used to bring you joy that you've slowly stopped making room for. What happened?","Where in your life do you feel a dim version of something that should feel brighter? What's getting in the way?","What would 'allowing yourself to feel good' look like today — not perfectly, but genuinely?"]},
{id:"m20",num:"XX",suit:"major",name:"Judgement",symbol:"🔔",keywords:"Awakening · Reckoning · Soul's calling",element:"Fire",astro:"Pluto",numNote:"Twenty (reducing to two) is the number of the higher reckoning — the soul's accounting. It asks: who have you been, and who are you now called to become?",upright:"Something is calling you forward — toward a truer version of yourself. Will you answer?",reversed:"Fear of judgment — your own or others' — keeps you from rising. What verdict have you handed down on yourself?",symbolism:"The Archangel Gabriel blows a trumpet from the clouds; figures rise from open coffins — arms outstretched, faces upturned. Mountains of ice rise in the background, barriers of the past. This is not the end — it is the moment of being called back to life.",themes:["Awakening","Calling","Reckoning","Forgiveness","Renewal","Purpose","Soul","Accountability"],in_reading:"The great reckoning — not punishment but honest accounting and the invitation to rise. Upright: self-reflection that leads to transformation. Reversed: harsh self-judgment or a calling being ignored.",advice_upright:"The call has come before. You've heard it. What's been stopping you from answering it this time?",advice_reversed:"You are judging yourself more harshly than the evidence warrants. What sentence are you serving, and who gave it to you?",prompts_upright:["What have you been called toward lately that you've been slow to answer? What's held you back?","Write about a moment of genuine reckoning when you saw yourself clearly and had to choose who to be.","What part of your past are you ready to review not with shame, but with understanding?"],prompts_reversed:["Write about the harshest judgment you hold about yourself. Is it true? Is it fair?","Where are you waiting for permission — from someone else or yourself — to step into who you're becoming?","What would it mean to forgive yourself for something you've been carrying as a failing?"]},
{id:"m21",num:"XXI",suit:"major",name:"The World",symbol:"🌍",keywords:"Completion · Integration · Wholeness",element:"Earth",astro:"Saturn",numNote:"Twenty-one (reducing to three) is the number of creative completion — the full circle of three achieved at the highest level. It is expression fully realised, the dance at the end of the journey.",upright:"A cycle completes. You have arrived somewhere real — honour it. And then: what wants to begin?",reversed:"Something remains unfinished. A loose thread keeps true completion just out of reach.",symbolism:"A dancing figure — androgynous, draped in a purple sash — moves within a laurel wreath, holding two wands. Around the wreath, the four fixed zodiac creatures reappear. The wreath is complete, whole. But the figure dances: completion is not stasis, it is the fullness from which the next cycle begins.",themes:["Completion","Wholeness","Integration","Mastery","Achievement","Arrival","Culmination","New cycle"],in_reading:"Genuine completion, not the appearance of it. Upright: honour what you've accomplished before the next beginning. Reversed: a cycle not yet closed.",advice_upright:"Before you reach for the next thing: stop. You've actually done something. Let yourself know it fully.",advice_reversed:"The completion you're looking for requires one more honest step. What is the thing you're leaving undone?",prompts_upright:["What cycle in your life is genuinely completing right now? Take time to name it and celebrate it.","Write about the full arc of something you've accomplished — beginning, middle difficulty, and where you stand now.","What does 'wholeness' feel like to you? Is there a moment recently when you've touched it?"],prompts_reversed:["What chapter in your life is nearly done but not yet closed? What's the final step you keep not taking?","Write about something you've left unresolved not because it can't be finished, but because finishing it means facing something.","What would your life feel like with proper closure on the things you've been leaving open?"]}
];

function mkCard(id,num,suit,name,symbol,keywords,element,astro,numNote,upright,reversed,symbolism,themes,in_reading,adv_up,adv_rev,pu,pr){
  const isC=["Page","Knight","Queen","King"].some(r=>name.startsWith(r));
  const cap=s=>s.charAt(0).toUpperCase()+s.slice(1);
  return{id,num,suit:suit.toLowerCase(),name,symbol,keywords,element,astro,numNote:numNote||"",arcanaLabel:isC?`${cap(suit)} Court`:`${cap(suit)} · ${num}`,upright,reversed,symbolism,themes,in_reading,advice_upright:adv_up,advice_reversed:adv_rev,prompts_upright:pu,prompts_reversed:pr};
}
const WANDS=[
mkCard("w1","1","Wands","Ace of Wands","🔥","Inspiration · Potential · Creative spark","Fire","Fire","The Ace is the pure essence of its suit — potential before form. In Wands, it is the spark of pure creative will, the moment before an idea becomes action.","A burst of creative energy or inspiration arrives. Something wants to be started — answer the call.","Creative blocks or false starts delay you. The spark is there but something prevents ignition.","A hand emerges from a cloud grasping a budding wand — the divine gift of creative fire offered to the one willing to receive it. Leaves sprout from the wand even now, showing that growth begins the moment the spark is taken.",["Inspiration","Potential","New projects","Enthusiasm","Creative fire","Initiation"],"The best possible beginning for creative endeavours. Upright: say yes. Reversed: examine what's blocking the initial impulse.","The idea arrived for a reason. Don't talk yourself out of it before you've even begun.","The creative impulse hasn't left — it's waiting for you to stop blocking it. What's in the way?",["What idea or project has been quietly asking for your attention? What's one concrete step today?","Write about a time you felt genuinely inspired. What conditions made that possible?","What would you create if you knew it didn't have to be perfect?"],["What creative idea have you been dismissing or postponing? What's the real reason?","Where does self-doubt show up most strongly when you try to create? What story is underneath it?","Write about a 'false start' you've experienced. What did it teach you about how you approach new beginnings?"]),
mkCard("w2","2","Wands","Two of Wands","🔥","Planning · Vision · Future","Fire","Mars in Aries","Two of Wands is the first look outward — the pause between inspiration and action where a plan takes shape.","You stand at a threshold, surveying your options. The world is open to you — now choose your direction.","Fear of the unknown or overplanning keeps you from stepping forward.","A figure stands on a castle wall holding a globe, gazing at distant lands. He has already achieved something here — the wand beside him is fixed, established. But he looks outward. The globe is small in his hand: the world is manageable.",["Planning","Vision","Ambition","Expansion","Decision","Courage"],"The card of looking beyond the familiar. Upright: bold planning, the world is your canvas. Reversed: hesitation, too much analysis.","You've done the thinking. Now it's time to decide — not the perfect path, just a path.","Planning is not the same as doing. What would change if you moved before you felt completely ready?",["What larger vision are you working toward? Write about where you want to be in a year.","Where in your life are you ready to expand beyond your current borders?","Write about a decision you've been circling. What does each option represent?"],["Where are you overthinking something that needs a decision? What are you most afraid of getting wrong?","Write about a time you waited too long and missed a window. What were you waiting for?","What would you do differently if you trusted yourself more?"]),
mkCard("w3","3","Wands","Three of Wands","🔥","Expansion · Progress · Foresight","Fire","Sun in Aries","Three of Wands is the early fruit of the Two's decision — the first signs of progress, the ship already launched.","Your plans are in motion and the early signs are good. Keep the long view — what you've set in motion is working.","Delays and setbacks frustrate progress. Expectations may have been unrealistic.","A figure stands on a cliff watching ships sail on distant seas — ships he has already sent out. He holds one wand while two are planted firmly behind him. He is not waiting to begin; he has already begun.",["Expansion","Progress","Momentum","Long-term vision","Confidence","Results"],"The card of early momentum. Upright: things are moving in the right direction. Reversed: frustrating delays, or a need to reassess.","What you've started is beginning to take shape. Trust the process enough to give it time.","Setbacks don't mean the vision is wrong — they mean the path needs adjusting. What needs rethinking?",["What project or goal is in motion right now? Write about the early signs it's working.","Where in your life are you being asked to take the long view rather than the short one?","Write about something you set in motion that is now bearing fruit."],["Where are you experiencing frustrating delays? What's within your control to change?","Write about a time a setback turned out to be a redirection toward something better.","What expectations might be contributing to your frustration?"]),
mkCard("w4","4","Wands","Four of Wands","🔥","Celebration · Stability · Community","Fire","Venus in Aries","Four of Wands is the stable foundation expressed through fire — a moment of earned rest and gathering together.","A time to celebrate and rest in what you've built. Joy, community, and a sense of arrival are present.","Disrupted harmony or a delayed celebration. Something prevents the full enjoyment of what's been accomplished.","Four wands form a canopied arch hung with flowers and fruit, beneath which people dance and celebrate. A castle stands in the background. This is the party after the hard work, the harvest festival.",["Celebration","Home","Community","Stability","Harvest","Joy","Belonging"],"One of the deck's clearest cards of joy. Upright: enjoy what you've built. Reversed: joy disrupted or celebration postponed.","You've earned this moment of rest and celebration. Let yourself be fully in it.","What would need to shift for you to feel genuinely celebratory right now? That's worth examining.",["What have you accomplished recently that deserves more celebration than you've given it?","Write about a place or community where you feel a genuine sense of belonging.","What would it look like to mark a recent milestone properly — to actually honour it?"],["Is there something you've accomplished that you haven't let yourself fully enjoy? What got in the way?","Write about a time a celebration was disrupted or felt hollow. What were you hoping it would give you?","What does 'home' mean to you right now? Is that sense of home present in your life?"]),
mkCard("w5","5","Wands","Five of Wands","🔥","Conflict · Competition · Chaos","Fire","Saturn in Leo","Five disrupts four's harmony — in Wands, this manifests as the clash of competing energies or ideas.","Conflict, competition, or chaos demands your energy. Not all of this is bad — some friction produces heat and light.","Conflict avoided, suppressed, or finally resolving. Inner tension may be what's really at stake.","Five figures clash with wands in apparent chaos — but no one appears to be seriously hurt. This is the scrimmage, the competitive game, the argument that sharpens ideas.",["Conflict","Competition","Disagreement","Chaos","Challenge","Energy","Growth through friction"],"The card of productive — and sometimes unproductive — conflict. Upright: engage with clarity. Reversed: avoid conflict that needs facing, or conflict cooling.","Not all conflict is a problem to resolve — some is productive friction. Engage with clarity rather than reactivity.","The conflict you've been avoiding hasn't disappeared — it's just moved inward. What are you actually fighting with yourself about?",["Where in your life is there active conflict or competition right now? What's really at stake?","Write about a time conflict made you sharper, better, or more clear about what you wanted.","Where are you holding back from a necessary disagreement? What are you afraid of?"],["Where have you been suppressing conflict that actually needs to be addressed?","Write about an inner conflict — two parts of yourself pulling in different directions. What does each part want?","Is there a situation where you've been passively avoiding a direct conversation? What do you really want to say?"]),
mkCard("w6","6","Wands","Six of Wands","🔥","Victory · Recognition · Progress","Fire","Jupiter in Leo","Six restores harmony after five's disruption — in Wands, this is the earned victory, the public recognition.","Victory and recognition arrive. You've earned this — let yourself be seen in your success.","Delayed recognition or arrogance clouding a genuine achievement.","A figure rides through a crowd on horseback, a laurel wreath on their head and wand, while others carry wands in procession. This is the victory parade, the public acknowledgment, the moment of genuine triumph.",["Victory","Recognition","Success","Confidence","Leadership","Pride","Achievement"],"The card of earned success and public recognition. Upright: own it. Reversed: success undermined by pride, or recognition delayed.","This is a moment to stand fully in your achievement without diminishing it. Let yourself be seen.","Check whether pride or comparison is dimming what should be a genuine moment of satisfaction.",["Write about something you've achieved recently that you haven't fully claimed or owned. What stops you?","Where do you hold back from being seen as competent or accomplished? Why?","Write about a time you received genuine recognition. How did it feel? Did you let it in?"],["Where is pride or comparison preventing you from enjoying a genuine success?","Write about a time you achieved something but immediately looked to the next thing rather than resting in the accomplishment.","Is there recognition you've been waiting for from a specific person? What would it give you that you can't give yourself?"]),
mkCard("w7","7","Wands","Seven of Wands","🔥","Perseverance · Defence · Resolve","Fire","Mars in Leo","Seven of Wands is the mystic number applied to fire — the solitary seeker holding their position against opposition.","Hold your ground. You are outnumbered but your position is strong — defend what you believe in.","Giving up prematurely or feeling overwhelmed by opposition. Is the battle worth the cost?","A figure stands on a raised position, fending off six wands from below with a seventh. They hold the high ground. The position is defensible — the question is whether you have the will to keep defending it.",["Perseverance","Defence","Conviction","Determination","Standing firm","Challenge","Resilience"],"The card of holding your ground. Upright: your position is defensible. Reversed: exhaustion or a need to reassess.","You don't need to win every battle today — just don't give up the position that actually matters.","There is a difference between perseverance and stubbornness. Is this a hill you actually need to die on?",["What position, value, or belief are you currently having to defend? What keeps you holding on?","Write about a time you held your ground when everyone seemed to be against you. What did that cost? What did it give you?","Where do you need to be more willing to stand firm rather than accommodating everyone?"],["Is there a fight you've been waging that's exhausting you without moving you forward? What would stepping back mean?","Write about the difference between defending what matters and defending your ego. Which one is happening?","Where are you feeling overwhelmed by opposition? What support do you actually need?"]),
mkCard("w8","8","Wands","Eight of Wands","🔥","Speed · Movement · Communication","Fire","Mercury in Sagittarius","Eight of Wands is the power of eight expressed as pure momentum — things moving fast, messages flying, obstacles cleared.","Things are moving quickly. Communication flows, travel opens, and projects accelerate — ride the momentum.","Delays, miscommunications, or scattered energy slow what should be moving. Haste is making waste.","Eight wands fly through the air in formation, aimed downward at a clear destination. There is no figure — only the pure motion of the wands themselves. This is speed, clarity of aim, and the moment when everything lines up at once.",["Speed","Movement","Communication","Travel","Momentum","Clarity","News"],"The card of swift movement and news arriving. Upright: accelerating — stay focused. Reversed: delays, miscommunication.","This is a moment of momentum — make your moves now while the energy is with you.","Slow down enough to make sure you're moving in the right direction. Speed in the wrong direction is costly.",["What in your life is currently moving quickly? How are you showing up to meet that energy?","Write about a time when everything seemed to line up and flow at once. What conditions made that possible?","What communication have you been delaying that needs to happen now?"],["Where are you experiencing frustrating delays? What might be the root cause?","Write about a time you rushed and made errors. What did you learn about your relationship with speed?","Where is scattered energy preventing progress? What would 'focused' look like for you today?"]),
mkCard("w9","9","Wands","Nine of Wands","🔥","Resilience · Persistence · Guarded","Fire","Moon in Sagittarius","Nine of Wands is the earned wariness of someone who has been through the battles — the wisdom of the survivor.","You're tired but still standing. Resilience and hard-won experience carry you through the final stretch.","Paranoia, stubbornness, or rigid defensiveness. Past wounds are colouring your perception of the present.","A weary figure leans on one wand, bandaged head, looking back over a row of eight wands planted behind them — a defensive barrier. They have been in battle. They are not done, but they have not fallen.",["Resilience","Persistence","Caution","Defensiveness","Endurance","Experience","Wariness"],"The card of battle-worn persistence. Upright: draw on your reserves. Reversed: past wounds creating excessive defensiveness.","You've come further than you're giving yourself credit for. The end of this particular test is closer than it feels.","Not everyone is out to get you. What past experience is making you see threat where there isn't one?",["Write about a time you were exhausted but kept going. What sustained you?","Where in your life are you in the 'final stretch' of something hard? What do you need to make it through?","What hard-won wisdom have you earned from your struggles that you sometimes forget to apply?"],["Where is past hurt making you overly defensive in the present? What does that defensiveness cost you?","Write about a relationship where you're on guard even when you don't need to be. What would it feel like to relax?","Is there stubbornness in how you're approaching a current challenge? What would 'flexible' look like?"]),
mkCard("w10","10","Wands","Ten of Wands","🔥","Burden · Overcommitment · Responsibility","Fire","Saturn in Sagittarius","Ten of Wands is the full weight of fire's ambition arrived at once — the completion of the suit's arc through the shadow of having taken on too much.","You're carrying too much. Consider what can be put down — not everything that could be yours needs to be carried by you.","Overwhelm, burnout, or the inability to delegate. The burden is crushing rather than purposeful.","A figure struggles forward bent under the weight of ten wands. A town can be seen ahead — they're almost home, but the cost is visible. They chose this burden.",["Burden","Overcommitment","Responsibility","Burnout","Carrying too much","Release","Completion"],"The card of the overstretched achiever. Upright: put something down. Reversed: genuine burnout.","Ambition is not the same as taking on everything. What can you honestly let go of or delegate?","This isn't a situation to push through — it's one to reorganise. What is the cost of carrying all of this?",["What are you currently carrying that isn't actually yours to carry? What would happen if you put it down?","Write about your current commitments. Which ones genuinely align with what matters most to you?","What would it feel like to reach your current destination — to finish what you've been lugging?"],["Write honestly about your current energy levels. Are you running on reserves? How long has that been true?","What would you need to stop doing or delegate to feel like yourself again?","Write about a time you burned out. What were the signs you ignored? Are any of those signs present now?"]),
mkCard("wpg","Pg","Wands","Page of Wands","🔥","Enthusiasm · Exploration · New ideas","Fire","Earth of Fire","Pages are students of their suit — in Wands, this is the young explorer bursting with ideas and enthusiasm.","Approach whatever is in front of you with curiosity and enthusiasm. A message or new creative idea may arrive.","Immaturity, unreliability, or big ideas without follow-through. All spark and no sustained flame.","A young figure holds a wand upright, gazing at it intently as if seeing its potential for the first time. Salamanders adorn their clothing — the symbol of fire. They stand in a desert landscape, alone and eager.",["Enthusiasm","Curiosity","Beginnings","Messages","Creativity","Youth","Exploration"],"The enthusiastic beginner. Upright: say yes to the new. Reversed: scattered energy or an idea that won't get past the talking stage.","Follow the thread of genuine enthusiasm — it's pointing toward something real.","Enthusiasm is not enough on its own. What would it take to turn the idea into something you actually finish?",["What genuinely excites you right now — not what should excite you, but what actually does?","Write about a time your beginner's enthusiasm led you somewhere unexpected and good.","What new interest has appeared recently that you've been quick to dismiss as 'not serious enough'?"],["Write about the pattern of starting things you don't finish. Where did that pattern begin?","What would it mean to choose one thing and see it through, rather than moving on when the excitement fades?","Where is 'big ideas' energy operating in your life without the commitment to match?"]),
mkCard("wkn","Kn","Wands","Knight of Wands","🔥","Action · Passion · Adventure","Fire","Fire of Fire","Knights are the suits in motion — in Wands, this is fire doubled: pure, fast, passionate, and sometimes reckless.","Act boldly and with passion. This is not the time for caution — the Knight charges and the charge itself creates momentum.","Recklessness, impulsivity, or scattered direction. All speed, no aim.","A Knight charges forward on a rearing horse, wand raised, salamanders blazing on their armour. The landscape is arid but the energy is electric. This is passion in motion.",["Action","Courage","Passion","Adventure","Impulsivity","Speed","Boldness"],"The most energetic card in the deck. Upright: act with passion and speed. Reversed: reckless action without direction.","Don't second-guess this one. Move with the energy before the window closes.","Speed without direction is dangerous. Before you charge, ask: where exactly are you going?",["Where in your life is bold, passionate action exactly what's needed right now?","Write about a time you threw yourself into something without overthinking it. What happened?","What adventure have you been talking yourself out of? What's one step toward it?"],["Write about a time your impulsivity caused a problem. What was the underlying emotion driving you?","Where are you currently moving fast without a clear sense of direction? What does slowing down reveal?","What is the difference, for you, between bold action and recklessness? Where is that line?"]),
