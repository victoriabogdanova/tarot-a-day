mkCard("wqu","Qu","Wands","Queen of Wands","🔥","Confidence · Independence · Vibrancy","Fire","Water of Fire","Queens embody the mature, inward expression of their suit — in Wands, this is the woman who knows her own fire and wields it with warmth and authority.","Lead with confidence and warmth. Your passion and creativity are powerful gifts — share them openly.","Jealousy, insecurity, or creative fire turned inward and burning instead of illuminating.","A Queen sits on a throne decorated with lions and sunflowers, a wand in one hand and a black cat at her feet — the domestic and the wild held in balance. She is the fire that both warms and lights.",["Confidence","Creativity","Independence","Warmth","Passion","Leadership","Self-assurance"],"The card of creative and personal authority. Upright: own your power with warmth and generosity. Reversed: confidence eroded by comparison.","Your enthusiasm is contagious. Lead with it rather than dimming it to make others comfortable.","The creativity you're criticising in others is often the creativity you're afraid to express in yourself. Examine that.",["Write about a domain of your life where you feel genuinely confident and at home. What got you there?","How do you lead — formally or informally? Write about the kind of influence you naturally have on others.","Where in your life are you dimming your fire to make others comfortable? What would it look like to stop?"],["Write honestly about a recent moment of jealousy or comparison. What was it actually about?","Where has your confidence been eroded lately? When did that start?","What would you create or do if you weren't comparing yourself to anyone else?"]),
mkCard("wki","Ki","Wands","King of Wands","🔥","Vision · Leadership · Entrepreneurship","Fire","Air of Fire","Kings embody the outward, masterful expression of their suit — in Wands, this is the visionary leader who has harnessed fire's energy into sustained, purposeful direction.","Lead with vision and generosity. Your energy and ideas have the power to inspire others — step into that role.","Impulsiveness at the leadership level, or vision without the discipline to execute.","A King sits on a throne of lions and salamanders, wand in hand, surveying his domain with easy authority. Unlike the Knight's charge, the King's power is patient and strategic. He has turned passion into purpose.",["Vision","Leadership","Charisma","Entrepreneurship","Authority","Inspiration","Strategy"],"The mastery of fire's energy. Upright: lead, inspire, execute with passion. Reversed: autocratic tendencies or grandiosity without substance.","Your vision has the potential to genuinely inspire others. What would it look like to fully step into that role?","Check whether you're leading or just performing. Real authority comes from follow-through, not just ideas.",["Write about your vision for a project, community, or aspect of your life. What are you trying to build?","How do you currently inspire or lead others? What's working?","What would 'leading from your values' look like in your current situation?"],["Write about the gap between your vision and your follow-through. What consistently gets in the way?","Where is impulsiveness showing up in your leadership or decision-making? What's the cost?","Write about a time you had a brilliant idea but failed to execute it. What did that teach you?"])
];

const CUPS=[
mkCard("c1","1","Cups","Ace of Cups","💧","Love · New feelings · Emotional beginning","Water","Water","The Ace of Cups is the pure gift of emotional life — love, connection, and feeling offered at their most elemental.","An emotional new beginning. Love, connection, or creative inspiration arrives — open your heart to receive it.","Emotional blockage, unexpressed feelings, or a creative wellspring that has run dry.","A hand emerges from a cloud holding a golden cup overflowing with water. A dove descends bearing a wafer. Five streams pour from the cup into a sea of lotus blossoms. This is grace made tangible — the heart's fullness offered before we've even asked.",["Love","New emotions","Intuition","Creativity","Connection","Grace","Abundance of feeling"],"The best possible beginning for emotional, creative, or relational matters. Upright: open your heart and receive. Reversed: something is blocking the flow of feeling.","Something is being offered to you emotionally right now. Lower your guard enough to receive it.","The feeling you've been suppressing needs acknowledgment. What's actually in the cup?",["What would it look like to open your heart a little more in your current situation?","Write about a time you felt genuinely full of love or connection. What conditions made that possible?","What creative or emotional project has been asking to be born? What's one step toward beginning?"],["What emotion have you been 'managing' rather than actually feeling? What would it be like to let yourself feel it?","Write about something that has left you emotionally dry. How long has that been true?","Where has the creative well felt empty lately? What used to fill it?"]),
mkCard("c2","2","Cups","Two of Cups","💧","Partnership · Mutual attraction · Union","Water","Venus in Cancer","Two of Cups is the first meeting of two distinct emotional lives — the mutual recognition that says 'I see you and you see me.'","A genuine connection deepens. Partnership, mutual attraction, and the beginning of a meaningful bond.","Imbalance in a relationship, miscommunication, or a connection pulling apart.","A man and woman face each other, exchanging cups in a formal gesture of union. Between them rises a caduceus — the symbol of exchange — and a winged lion's head. This is the moment of mutual recognition, the covenant freely entered.",["Partnership","Attraction","Connection","Harmony","Equality","Reciprocity","Bond"],"The card of mutual connection and partnership. Upright: a meaningful bond is forming. Reversed: imbalance, disconnection.","Let the connection be what it is. Don't analyse it into the ground before it has a chance to grow.","What's out of balance in this relationship? And are you contributing to that imbalance in some way?",["Write about a relationship in your life that feels genuinely mutual and reciprocal. What makes it work?","Where in your life are you experiencing a new or deepening connection? What do you feel?","Write about what genuine partnership — in any area of life — looks like to you."],["Write about a relationship that feels out of balance right now. What's your part in the imbalance?","Where do you feel disconnected from someone you care about? What would reconnection require?","Write about a time you fell out of connection with someone important. What happened?"]),
mkCard("c3","3","Cups","Three of Cups","💧","Celebration · Friendship · Community","Water","Mercury in Cancer","Three of Cups is joy multiplied — not the solitary contentment of one but the expansion of feeling into shared celebration.","Celebrate with the people you love. Friendship, community, and shared joy deserve your full presence.","Overindulgence, isolation from community, or celebration masking something that needs attention.","Three women dance in a circle, raising their cups in a toast. Flowers and fruit surround them. This is unambiguous joy — the pleasure of being known and loved by others, of belonging to something warm and alive.",["Celebration","Friendship","Community","Joy","Togetherness","Abundance","Belonging"],"One of the deck's clearest cards of communal joy. Upright: celebrate, connect, be with your people. Reversed: isolation or overindulgence.","Make the plan. Gather the people. The connection you find there will nourish you more than you expect.","Are you celebrating to feel something, or to avoid feeling something? There's a difference.",["Who are the people in your life that you can be fully yourself with? Write about what that feels like.","What would it look like to celebrate something you've been letting pass uncelebrated?","Write about a memory of communal joy — a moment of genuine togetherness. What made it so alive?"],["Are you isolating yourself right now? If so, what are you avoiding by staying separate?","Write about the role celebration plays in your life. Is it nourishing or numbing?","Where do you feel disconnected from community? What would it take to find your people again?"]),
mkCard("c4","4","Cups","Four of Cups","💧","Apathy · Contemplation · Discontent","Water","Moon in Cancer","Four of Cups is four's stability turned inward — a stillness that has become stagnation, a contentment that has curdled into boredom.","A period of introspection and mild discontent. Something is being offered that you can't quite see yet.","Emerging from withdrawal, new motivation, or finally seeing what's been in front of you all along.","A young man sits cross-armed beneath a tree, staring at three cups before him while a hand extends a fourth from a cloud — offering something new. He doesn't see the fourth cup. This is the card of not seeing what's right there.",["Apathy","Discontent","Introspection","Withdrawal","Missed opportunity","Contemplation"],"The card of not seeing what's being offered. Upright: lift your eyes. Reversed: finally coming out of withdrawal.","Something is being offered to you that your current mood is making invisible. Lift your eyes.","The restlessness you've been feeling has a purpose — it's pointing toward something new. Follow it.",["Write about a time you were so focused on what you didn't have that you missed what was right in front of you.","Where in your life have you been feeling apathetic or uninspired? What might have led you here?","What is actually being offered to you right now that you haven't fully noticed?"],["Write about what's motivating you right now after a period of apathy or withdrawal.","What has the quiet period you've been in revealed to you?","Write about something you almost missed but caught at the last moment. What helped you see it?"]),
mkCard("c5","5","Cups","Five of Cups","💧","Loss · Grief · Regret","Water","Mars in Scorpio","Five of Cups is the disruption of feeling — the moment grief or loss or disappointment breaks emotional stability.","Grief and loss deserve your full attention. But there are still cups standing behind you — don't lose them to regret.","Moving through grief, returning to hope, or refusing to look at loss that still needs acknowledgment.","A cloaked figure stares at three spilled cups, back turned to two upright cups still standing. A river flows nearby; a bridge leads to a distant castle. All the attention is on what's lost. The refusal to turn around is the card's central gesture.",["Loss","Grief","Regret","Disappointment","Partial loss","Mourning","Perspective"],"The card of grief and regret. Upright: your sorrow is real — and there is still something left. Reversed: moving through grief, or denial of it.","Give the grief its time — but don't let it convince you that the spilled cups are all there ever were.","Are you moving through the loss genuinely, or moving on too quickly to avoid it? Check in honestly.",["Write about a loss you haven't given its full weight. Let yourself grieve it on the page.","What are the 'two cups still standing' in your current situation — the things that remain after what's been lost?","Write about the relationship between grief and gratitude. Can both exist at the same time?"],["Are you moving through grief at a pace that's honest, or are you rushing the process? What does your body say?","Write about a loss you've been reluctant to acknowledge. What makes it hard to look at?","What would it mean to fully turn and face what's still standing — still good — in your life right now?"]),
mkCard("c6","6","Cups","Six of Cups","💧","Nostalgia · Memory · Innocence","Water","Sun in Scorpio","Six of Cups is six's harmony expressed through the past — the warmth of memory, the comfort of familiar feeling.","Nostalgia, happy memories, and reconnection with the past offer comfort and insight now.","Living in the past, idealising what was, or refusing to move into the present.","A young boy gives a girl a cup overflowing with white flowers. The scene is warm and safe — a courtyard, older figures in the background. This is the card of childhood, of innocent pleasure, of good memories.",["Nostalgia","Memory","Childhood","Innocence","Gifts","Simple joys","Reunion"],"The card of the past's positive influence. Upright: a happy memory nourishes you. Reversed: stuck in the past or idealising it.","Let the warmth of a good memory actually warm you. There is nourishment in remembering what you loved.","The past was not only good, and the present is not only bad. Be honest about both.",["Write about a memory from your past that still warms you. What made it so alive?","Is there something from your past that you've moved on from too quickly that still has something to offer?","Write about a gift you've received — not necessarily material — that you still carry."],["Write about a way you idealise the past that might not be serving you well. What are you glossing over?","Where are you living in a 'good old days' mindset? What does that prevent you from receiving in the present?","Write about the difference between honouring your past and being held captive by it."]),
mkCard("c7","7","Cups","Seven of Cups","💧","Illusion · Fantasy · Choices","Water","Venus in Scorpio","Seven of Cups is the mystic number applied to feeling — the proliferation of visions and desires, beautiful and seductive, most of which are not what they appear.","You are presented with many options or fantasies. Not all are what they seem — choose with eyes open.","Choosing wisely after a period of confusion, or illusion finally seen through.","A silhouetted figure stands before seven cups floating in clouds, each containing a different vision — treasure, victory, a serpent, a beautiful face, a castle, laurels, a dragon. The choices shimmer with appeal. None have been verified.",["Illusion","Fantasy","Choices","Wishful thinking","Confusion","Temptation","Dreams"],"The card of attractive illusions. Upright: you have many options but need clarity before choosing. Reversed: clarity emerging.","Not everything that glitters is what you need. Before you choose, ask: what do I actually want, and is this it?","Now that you can see more clearly, what do you actually want? Name it.",["Write about a decision or array of options before you. What's the appeal of each? What's the reality?","Where are you indulging in fantasy about how something could be rather than how it actually is?","Write about a time you were seduced by a vision that turned out to be very different in reality."],["Write about an illusion you've recently seen through. What was the truth underneath?","Now that some confusion has cleared, what do you actually want?","Write about what 'choosing with eyes open' has looked like for you recently."]),
mkCard("c8","8","Cups","Eight of Cups","💧","Withdrawal · Moving on · Seeking deeper meaning","Water","Saturn in Pisces","Eight of Cups is the decision to walk away from what is good enough in search of what is true.","Something that once fulfilled you no longer does. Walk toward what you actually need, even if what you're leaving seems fine.","Staying in a situation that should be left, or returning to what was left for the wrong reasons.","A figure walks away at night, back to eight neatly stacked cups, moving toward mountains in the distance. The cups are full and ordered — nothing is wrong with them. But the figure leaves anyway, guided by a crescent moon.",["Moving on","Withdrawal","Seeking truth","Disillusionment","Journey","Courage","Deeper meaning"],"The card of voluntary departure. Upright: leave what no longer nourishes. Reversed: staying out of fear.","The fact that something looks fine on paper doesn't mean it's right for you anymore. Trust the feeling that says it's time.","Are you staying out of genuine love or out of fear of the unknown? Be honest with yourself.",["Write about something in your life that looks fine from the outside but no longer feels nourishing.","Write about a time you walked away from something good in search of something more true.","What are you being called toward that you've been ignoring because what you currently have seems adequate?"],["Where are you staying in a situation out of habit, fear, or sunk costs? What would leaving actually free?","Write about the difference between commitment and staying past the point of genuine connection.","If you went back to something you left, are you going back to the thing itself or to what you wished it had been?"]),
mkCard("c9","9","Cups","Nine of Cups","💧","Contentment · Satisfaction · Wishes fulfilled","Water","Jupiter in Pisces","Nine of Cups is the card of genuine satisfaction — the wish card, the deep breath of 'I have what I need.'","A wish fulfilled. Genuine contentment and emotional satisfaction are present — let yourself enjoy it.","Overindulgence, complacency, or a satisfaction that's more surface than substance.","A man sits arms-crossed in front of an arc of nine cups, looking deeply pleased with himself. This is the contentment of genuine fulfilment — not performance, not pretence. He has what he wished for.",["Contentment","Wish fulfilled","Satisfaction","Pleasure","Abundance","Joy","Self-satisfaction"],"The 'wish card' — one of the most positive in the deck. Upright: enjoy what you have. Reversed: complacency or surface satisfaction.","What you have is genuinely good. Let yourself know that and enjoy it without immediately looking for the catch.","Check whether the satisfaction you feel is real or whether it's the comfort of not looking too closely.",["Write about something in your life right now that you feel genuine satisfaction about.","What wish, small or large, has come true recently that you haven't fully acknowledged?","Write about what contentment feels like for you. Is it a familiar feeling? A rare one?"],["Write about a satisfaction that might be more complacency than genuine fulfilment. What are you not looking at?","Where have you been overindulging in a way that's starting to feel hollow?","What would 'genuine' contentment look like for you, as opposed to the appearance of it?"]),
mkCard("c10","10","Cups","Ten of Cups","💧","Harmony · Family · Emotional fulfilment","Water","Mars in Pisces","Ten of Cups is the completion of the emotional suit — the rainbow's promise fulfilled, the family whole.","Emotional fulfilment and harmonious relationships — the vision of the good life, and you're in it.","Family discord, disrupted harmony, or a vision of happiness that doesn't quite match the reality.","A couple stands arms outstretched beneath a rainbow of ten cups, while two children dance nearby. A river flows, a home stands in the background. This is the card of the deeply happy family, of love made into a life.",["Family","Harmony","Fulfilment","Love","Belonging","Lasting happiness","Community"],"The emotional completion of the Cups suit. Upright: genuine harmony and relational fulfilment. Reversed: disruption in the home.","The people around you and the life you've built deserve your full, grateful presence. Be in it.","Where has the 'ideal relationship' story gotten in the way of actually loving the real thing?",["Write about the version of relational fulfilment that's actually present in your life right now.","Who are the people that make up 'home' for you? Write about what they mean to you.","What does emotional abundance look like in your life? Are you letting yourself have it?"],["Write about a discord in a close relationship or family dynamic. What's underneath it?","Where does the gap between your ideal image of relationship and the reality cause you pain?","Write about what 'harmony' in your closest relationships would actually require from you."]),
mkCard("cpg","Pg","Cups","Page of Cups","💧","Sensitivity · Messages · Creative beginnings","Water","Earth of Water","The Page of Cups is the student of feeling — dreamy, intuitive, easily moved, full of undeveloped emotional and creative gifts.","Stay open to unexpected emotional messages or creative inspirations. Let yourself be surprised.","Emotional immaturity, over-sensitivity, or creative inspiration blocked by self-consciousness.","A young Page stands in a tunic decorated with flowers, holding a cup from which a fish unexpectedly pokes its head. The Page and the fish regard each other with equal surprise. This is the unexpected message from the unconscious.",["Sensitivity","Intuition","Messages","Creativity","Imagination","Youth","Surprise"],"The dreamy beginner of the Cups suit. Upright: stay open to unexpected creative or emotional messages. Reversed: over-sensitivity.","The unexpected message you've been dismissing as 'just a feeling' might be worth listening to.","Your sensitivity is a gift, not a liability — but right now it might be running the show. Find your ground.",["Write about an unexpected emotional message or creative idea that arrived recently. Did you listen to it?","Where in your life are you being called to be more playful or imaginative?","Write about a time your intuition surprised you with something accurate. What did you do with that?"],["Where is your emotional sensitivity working against you right now? How does it show up?","Write about the relationship between sensitivity and self-consciousness. Where do they overlap for you?","What creative expression have you been too self-conscious to attempt?"]),
mkCard("ckn","Kn","Cups","Knight of Cups","💧","Romance · Charm · Idealism","Water","Fire of Water","The Knight of Cups is fire applied to water — passion in the service of emotion, the romantic on a quest.","Pursue what your heart is drawn to. A romantic or creative opportunity arrives — meet it with openness.","Moodiness, manipulation through charm, or romantic idealism that avoids reality.","A Knight rides a calm white horse, holding a cup as if bearing a precious offering. Wings adorn his helmet. His horse walks rather than charges. He is the messenger of the heart.",["Romance","Idealism","Charm","Emotional courage","Creativity","Quest","Sensitivity"],"The romantic emissary. Upright: follow what moves you. Reversed: manipulation or excessive idealism.","Let yourself be moved by what is genuinely moving you. This is not the time for detachment.","Charm is not the same as depth. Check whether what's appealing is genuinely real.",["What are you being called to pursue from a place of genuine feeling — not strategy, not obligation?","Write about a time you were genuinely moved by something. What does being moved feel like?","What would it look like to act from your heart in your current situation?"],["Write about the role charm plays in your life — yours or someone else's. Where does it get in the way?","Where are you idealising something to the point where you can't see it clearly?","Write about the difference between romance and reality in your relationships or creative work."]),
mkCard("cqu","Qu","Cups","Queen of Cups","💧","Empathy · Emotional wisdom · Intuition","Water","Water of Water","The Queen of Cups is water doubled — the deepest emotional intelligence in the deck.","Lead with empathy and deep emotional intelligence. Your intuition is your greatest gift right now.","Emotional overwhelm, codependency, or emotional manipulation.","A Queen sits on a throne at the water's edge, gazing deeply into an ornate closed cup. The cup is elaborate, unique — her intuitive life is rich and private. She is of the water and above it at once.",["Empathy","Intuition","Emotional intelligence","Compassion","Depth","Nurture","Wisdom"],"The highest expression of emotional intelligence. Upright: trust your deep feeling and intuitive knowing. Reversed: emotional overwhelm or codependency.","Your emotional wisdom is real and earned. Trust it — even when it can't be explained rationally.","Empathy without boundaries is not empathy — it's absorption. Where do you end and others begin?",["Write about someone in your life who embodies emotional wisdom. What do you most admire?","Where in your life are you being called to lead with empathy rather than strategy?","Write about your intuition — how it speaks to you, and whether you've been listening lately."],["Where are you taking on others' emotional weight at the expense of your own wellbeing?","Write about the difference between empathy and codependency as you've experienced them.","Where is emotional sensitivity becoming manipulation — in yourself or someone around you?"]),
mkCard("cki","Ki","Cups","King of Cups","💧","Emotional maturity · Diplomacy · Compassionate authority","Water","Air of Water","The King of Cups is the mastery of feeling — not suppression of emotion but its wise governance.","Lead with compassionate wisdom. Your emotional maturity allows you to hold space for others without losing yourself.","Emotional volatility, suppression, or manipulation disguised as wisdom.","A King sits on a stone throne in the middle of the sea, unperturbed by the turbulent water around him. He holds a cup and a sceptre. A fish leaps from the water nearby. He is in the sea but not of it.",["Emotional mastery","Wisdom","Diplomacy","Compassion","Balance","Authority","Depth"],"The master of the emotional realm. Upright: lead from compassionate wisdom. Reversed: emotional instability or suppression masquerading as control.","The people around you need someone who can hold steady while feeling deeply. You are capable of that right now.","Check whether 'being calm' is actually suppression. Real emotional mastery includes being willing to feel.",["Write about a time you held space for someone else's feelings while staying grounded in your own.","What does emotional leadership look like in your life — at home, at work, in your community?","Write about the quality of emotional maturity you most want to embody. Where are you already expressing it?"],["Write about your relationship with your own emotional volatility. What triggers it? How do you recover?","Where are you performing emotional stability rather than actually having it?","Write about the difference between suppressing emotion and governing it. Which one feels more true to you now?"])
];
const SWORDS=[
mkCard("s1","1","Swords","Ace of Swords","🗡️","Clarity · Truth · New perspective","Air","Air","The Ace of Swords is pure mental force — the absolute clarity of a new idea, the truth that cuts through confusion.","A moment of piercing clarity or truth. A powerful new idea or perspective arrives — take hold of it.","Mental confusion, information overload, or a truth you're avoiding.","A hand emerges from clouds gripping a sword, its point surrounded by a crown wreathed in victory branches. The sword is the mind at its keenest — the instrument of discernment and truth.",["Clarity","Truth","New ideas","Decisiveness","Mental force","Breakthrough","Communication"],"The best possible beginning for mental endeavours. Upright: clarity has arrived — use it. Reversed: confusion, or a truth that needs to be spoken.","The clarity you have in this moment is accurate. Act on it before doubt creeps in.","What do you actually think, underneath the noise? Find that thought and follow it.",["Write about a moment of sudden clarity you've had recently — about a decision, a person, or yourself.","What truth do you need to speak or act on that you've been circling?","Write about a time a new idea completely changed how you saw something."],["Where are you feeling mentally overwhelmed or confused? What would it take to find one clear thought?","What truth are you avoiding looking at directly? Name it.","Write about information overload in your life. What would a clearer, simpler relationship with information look like?"]),
mkCard("s2","2","Swords","Two of Swords","🗡️","Stalemate · Avoidance · Difficult choice","Air","Moon in Libra","Two of Swords is the standoff — the mind refusing to choose, holding two opposing truths at equal distance.","A stalemate or difficult decision requires you to remove the blindfold and look clearly at what's in front of you.","The decision is being made — or avoided even more deeply. Anxiety may be peaking.","A blindfolded woman sits with arms crossed, holding two swords across her chest. Behind her, a sea of difficult waters. She has blindfolded herself — the refusal to see is a choice. The swords hold each other in perfect tension.",["Stalemate","Avoidance","Indecision","Balance","Difficult choice","Denial","Tension"],"The card of the standoff. Upright: remove the blindfold and make a decision. Reversed: anxiety peaking.","The information you need is already there. Take the blindfold off.","What are you afraid you'll have to do once you make this decision? That's the real question.",["Write about a decision you've been avoiding. What would you see if you removed the blindfold?","Where in your life are you holding two opposing truths in perfect, exhausting tension?","What are you refusing to look at directly? What would it cost you to look?"],["Write about the anxiety you feel around a current decision. What's underneath the anxiety?","What choice are you making by not making a choice?","Write about a time you finally made a difficult decision. What shifted the moment you did?"]),
mkCard("s3","3","Swords","Three of Swords","🗡️","Heartbreak · Grief · Painful truth","Air","Saturn in Libra","Three of Swords is the moment when truth pierces through feeling, when the heart is broken open by what can no longer be denied.","Grief and heartbreak are real and present. Allow yourself to feel them — the only way through is through.","Processing grief, healing from heartbreak, or refusing to let pain be acknowledged.","Three swords pierce a red heart against a background of rain and storm clouds. This is perhaps the most direct image in the deck — the heart wounded by the sharp truth. There is no comfort in this card, only the acknowledgment of pain.",["Heartbreak","Grief","Pain","Loss","Truth that hurts","Separation","Tears"],"The card of heartbreak and painful truth. Upright: acknowledge the pain — it is real. Reversed: healing in progress.","Don't intellectualise this. Let yourself actually feel it.","Healing from heartbreak is not linear and it can't be rushed. Where are you in the process?",["Write about a grief or heartbreak you're carrying right now. Give it full space on the page.","Write a letter to someone — or something — that has hurt you. You don't have to send it.","Where are you trying to make sense of something that simply hurts?"],["Write about where you are in the healing process from something painful. Be honest about the distance still to travel.","What are you doing to avoid feeling grief that hasn't been fully felt?","Write about something painful that, on the other side, you're grateful for having gone through."]),
mkCard("s4","4","Swords","Four of Swords","🗡️","Rest · Recovery · Retreat","Air","Jupiter in Libra","Four of Swords is stability sought after battle — the knight laid down, not in defeat but in necessary restoration.","Rest is not laziness — it is part of the work. Step back, recover, and let the mind be still.","Restlessness, inability to rest, or returning to action before recovery is complete.","A knight lies as if in effigy on a tomb, hands clasped, one sword beneath him and three above. A stained glass window filters coloured light. This is the warrior at rest — in the deep recovery that makes the next effort possible.",["Rest","Recovery","Retreat","Contemplation","Healing","Stillness","Preparation"],"The card of sacred rest. Upright: you need to stop and recover — this is not optional. Reversed: unable to rest.","The most productive thing you can do right now is rest. Not plan rest — actually rest.","What keeps you from being able to stop? That restlessness is worth understanding.",["When did you last genuinely rest — not scroll, not multitask, but actually rest? Write about what that felt like.","Write about your current relationship with recovery and restoration.","What would you be able to see, feel, or think if your mind had a chance to be quiet?"],["Write about what keeps you from resting even when you need to. What are you afraid will happen if you stop?","Where are you returning to action before you've genuinely recovered? What's the cost?","Write about the last time you felt truly restored. What made that possible?"]),
mkCard("s5","5","Swords","Five of Swords","🗡️","Conflict · Defeat · Hollow victory","Air","Venus in Aquarius","Five of Swords is disruption at its sharpest — not only the loss of battle but the question of whether winning this way was worth it.","A conflict has ended in a way that doesn't feel like victory. What is the cost of winning — or losing — this way?","Lingering conflict, aftermath of a fight, or beginning to move past a damaging situation.","A smug figure collects swords from defeated opponents who walk away in dejection. Someone has won and everyone has lost something. The victor's expression tells the whole story.",["Conflict","Defeat","Hollow victory","Pride","Aftermath","Cost","Disagreement"],"The card of conflict that leaves everyone diminished. Upright: examine the cost. Reversed: moving past a damaging situation.","Ask not just who won but what was lost in the winning. Was this conflict worth what it cost?","What would it take to actually move on from this rather than carrying the residue of it?",["Write about a conflict in your life. What has it cost you?","Write about the difference between fighting to be right and fighting for something that actually matters.","Where are you holding onto a grievance that is hurting you more than the other person?"],["Write about what moving on from a past conflict would actually look like. Not forgiveness — just release.","Where is the aftermath of an old conflict still affecting how you show up in the present?","Write about a time you fought hard for something and won — and what the hollow feeling of that victory taught you."]),
mkCard("s6","6","Swords","Six of Swords","🗡️","Transition · Moving on · Calmer waters","Air","Mercury in Aquarius","Six of Swords is six's harmony expressed through movement — the necessary passage from turbulence toward calmer waters.","A transition is underway. You're moving from difficulty toward calmer ground — the journey may be hard but the direction is right.","Resisting the transition, or unable to leave behind what needs to be left.","A ferryman poles a boat across water; a woman and child sit huddled in the prow, surrounded by six upright swords. The water on the far side is calmer. This is the willing passage — difficult, but the destination is better.",["Transition","Travel","Moving on","Healing","Passage","Relief","Recovery"],"The card of difficult but necessary transition. Upright: you're moving in the right direction. Reversed: resisting the passage.","The fact that the journey is hard doesn't mean the direction is wrong. Keep moving.","What are you refusing to leave behind that's making the transition impossible?",["Write about a transition you're currently in — what are you moving away from, and what toward?","Describe the 'calmer waters' you're heading for. Make them real and specific.","Write about what you're leaving behind on this journey. What needs acknowledgment before you go?"],["What are you clinging to that is making it impossible to move forward?","Write about a transition you've been resisting. What is the real reason you don't want to cross over?","Write about a past transition that was painful while you were in it but necessary in retrospect."]),
mkCard("s7","7","Swords","Seven of Swords","🗡️","Deception · Strategy · Cunning","Air","Moon in Aquarius","Seven of Swords is the clever plan that operates in the dark, the strategy that avoids confrontation.","A strategic withdrawal or clever manoeuvre may be necessary — but check whether deception is involved.","A deception coming to light, or the trickster caught.","A figure tiptoes away from a military camp carrying five swords, glancing back. Two swords remain planted. The expression is sly. This is the card of the strategist, the one who works around rather than through.",["Deception","Strategy","Cunning","Evasion","Theft","Clever manoeuvring","Dishonesty"],"The card of strategy and deception. Upright: a clever manoeuvre may be needed — is there deception involved? Reversed: deception discovered.","There's a difference between strategic and deceptive. Be honest with yourself about which one this is.","What has been hidden is becoming visible. What do you want to do with that information?",["Write about a situation where you're working around rather than through something. Is that wise or evasive?","Where might someone in your life not be fully honest with you? What do you actually sense?","Write about the difference between clever strategy and dishonesty. Where is that line for you?"],["Write about a deception — your own or someone else's — that is coming to light. How are you handling it?","Write about a time you got caught doing something you hoped wouldn't be noticed. What did you learn?","Where are you being more honest with yourself than you've been before? What prompted that shift?"]),
mkCard("s8","8","Swords","Eight of Swords","🗡️","Restriction · Self-imposed limits · Victim mentality","Air","Jupiter in Gemini","Eight of Swords is the bind that holds you — more self-imposed than external, the blindfold your own.","You feel trapped — but the ties that bind you are looser than they appear. The blindfold is yours to remove.","Beginning to free yourself, or deepening the self-imposed prison.","A blindfolded and bound woman stands surrounded by eight upright swords. She is not tied to them — they merely surround her. The bonds are loose. The blindfold prevents her from seeing this.",["Restriction","Self-imposed limits","Victim mentality","Fear","Blindness","Paralysis","Liberation"],"The card of self-imposed restriction. Upright: you are more free than you feel. Reversed: finding a way out.","The bars of this prison are mostly in your mind. What changes if you test them?","You're beginning to see the way out. Follow that sight even if it's uncomfortable.",["Write about a situation in which you feel trapped. How much of the trap is external and how much is internal?","What story are you telling yourself that makes freedom feel impossible?","Write about one small act of agency — however tiny — that you could take today."],["Write about what 'getting free' looks like for you right now. What would you do first?","What has recently shifted in your thinking that is making the trap feel less absolute?","Write about the fear underneath the restriction. What are you protecting yourself from by staying bound?"]),
mkCard("s9","9","Swords","Nine of Swords","🗡️","Anxiety · Nightmares · Worst-case thinking","Air","Mars in Gemini","Nine of Swords is the 3am mind at its bleakest — the anxiety that comes for us in the dark.","The anxiety is real — but most of what you're imagining is not. What specific fear deserves attention, and what is the mind's excess?","Recovery from anxiety, or anxiety peaking before it breaks.","A figure sits up in bed, head in hands, against a backdrop of nine swords hanging on the wall. This is the waking nightmare — the suffering that happens in the mind, often at night, often far larger than what the daylight will reveal.",["Anxiety","Nightmares","Worry","Fear","Sleeplessness","Mental suffering","Catastrophising"],"The card of anxiety. Upright: the fear is real but likely bigger in the mind than in reality. Reversed: anxiety beginning to ease.","Write down exactly what you're afraid of. Named fears are smaller than nameless dread.","The worst of the anxiety may be passing. What are you doing to support your recovery?",["Write down, as specifically as possible, your three biggest worries right now. Then examine each: what is real, and what is the mind's excess?","Write about what anxiety feels like in your body. Where does it live?","Write about what helps when the anxiety comes — not the cures, just what actually helps in the moment."],["Write about how anxiety has been shifting for you lately. What's easing?","What has helped you get through the worst of an anxious period in the past?","Write about the thing underneath the anxiety — the core fear that all the worry is circling."]),
mkCard("s10","10","Swords","Ten of Swords","🗡️","Painful ending · Rock bottom · Betrayal","Air","Sun in Gemini","Ten of Swords is the moment of absolute defeat, the lowest point from which the only direction is up.","This is the darkest moment — but it is also the turning point. What is over is truly over. What remains is yours.","Recovery beginning after rock bottom, or a refusal to accept an ending that is real.","A figure lies face down with ten swords in their back against a dark sky where a thin strip of dawn breaks on the horizon. This is the definitive end — brutal and absolute. But the dawn is there.",["Endings","Rock bottom","Betrayal","Defeat","Painful completion","The dawn after darkness","Turning point"],"The card of painful but definitive ending. Upright: rock bottom and the turning point. Reversed: beginning to rise.","It's over. Allow yourself to know that. And then, when you're ready — look at the horizon.","You are beginning to rise. Don't rush it — but do believe that the direction has changed.",["Write about what is definitively over in your life right now. Give it the full acknowledgment it deserves.","Write about a time you hit rock bottom. What was the first thing that helped you begin to climb?","What remains — what is still yours — after this ending?"],["Write about the first signs of dawn in what has been a dark period.","What are you doing to support your own recovery right now?","Write about the distance between where you are and where you want to be — with honest realism and some hope."]),
mkCard("spg","Pg","Swords","Page of Swords","🗡️","Curiosity · Ideas · Watchfulness","Air","Earth of Air","The Page of Swords is the student of the mind — sharp, alert, hungry for information, not yet wise enough to know what to do with it all.","Stay curious and alert. A new idea or important information arrives — think it through before acting.","Gossip, scattered mental energy, or sharp words used carelessly.","A Page stands with sword raised, looking back over their shoulder — perpetually vigilant, scanning the horizon. The wind blows through their clothes. This is youthful mental energy: sharp, quick, curious.",["Curiosity","Vigilance","Ideas","Communication","Alertness","Youth","Sharp wit"],"The curious student of Swords. Upright: stay alert and curious. Reversed: gossip or careless words.","Your curiosity is your greatest asset right now. Follow the question wherever it leads.","Sharp words leave marks. Think before you speak — or type.",["What question are you most curious about right now? Write everything you know and don't know.","Write about the last time you learned something that genuinely surprised you. What did it open up?","Where in your life are you being called to stay alert and gather more information before acting?"],["Write about a time careless words — yours or someone else's — caused real damage. What would you do differently?","Where is mental restlessness preventing you from going deep on anything?","Write about gossip — the role it plays in your life and what it costs you."]),
mkCard("skn","Kn","Swords","Knight of Swords","🗡️","Ambition · Drive · Sharp action","Air","Fire of Air","The Knight of Swords is fire applied to air — the fastest, most decisive card in the deck.","Act with decisiveness and speed. The time for deliberation is over — move.","Recklessness, harsh words, or a plan that hasn't been thought through enough.","A Knight charges at full gallop, sword raised, into a stormy sky. The horse's mane and the Knight's cape stream behind them. This is the mind as force of nature — fast, sharp, cutting through everything in its path.",["Speed","Decisiveness","Ambition","Sharp action","Force","Drive","Courage"],"The fastest card in the deck. Upright: act with decisive speed. Reversed: recklessness or moving before thinking.","You know what needs to be done. Do it now, without further analysis.","The speed with which you're moving is outrunning your thinking. Pause for thirty seconds and check your direction.",["What decision have you been overthinking that simply needs to be made and acted on?","Write about a time decisive action — even imperfect action — changed the course of something significantly.","What are you waiting for that, if you're honest, you're simply afraid to begin?"],["Write about a time you acted too quickly and caused harm or chaos. What would you do differently?","Where is your current pace of action outrunning your judgment? What do you need to slow down for?","Write about the relationship between speed and accuracy in how you typically operate."]),
mkCard("squ","Qu","Swords","Queen of Swords","🗡️","Clarity · Independence · Direct truth","Air","Water of Air","The Queen of Swords has known grief and loss and has emerged into clear, unsentimental truth.","Speak and think with clarity and honesty. Your direct perception is your gift — use it without harshness.","Coldness, cruelty disguised as honesty, or emotional isolation.","A Queen sits on a carved throne in a clear sky above the clouds, one hand raised in greeting or verdict, one holding an upright sword. Her expression is clear-eyed and direct. She has seen things; she does not pretend otherwise.",["Clarity","Independence","Honesty","Wisdom","Perception","Directness","Wit"],"The card of clear, honest, independent thinking. Upright: speak clearly and directly. Reversed: coldness or cruelty.","Say what is true. Kindly, if possible — but true, regardless.","There is a difference between honest and cutting. Check whether your 'clarity' is actually covering for something colder.",["Write about a situation where you need to speak with complete honesty. What do you actually think?","Write about someone in your life who embodies clear, compassionate directness. What do you admire?","Where in your life are you currently seeing things very clearly? Trust that."],["Write about a time you used 'honesty' as a weapon. What were you actually feeling?","Where are you being colder than you need to be? What would it cost you to soften just slightly?","Write about the relationship between your grief or losses and the way you communicate with others."]),
mkCard("ski","Ki","Swords","King of Swords","🗡️","Intellect · Authority · Ethical leadership","Air","Air of Air","The King of Swords is the mastery of the mental realm — clear thought governed by ethical principle.","Think clearly, speak precisely, and lead with integrity. Your intellectual authority is real — use it ethically.","Manipulative intelligence, cold authority, or using mental power to dominate.","A King sits on a carved throne, sword held upright, looking directly ahead with absolute clarity. The sky shows both clear sky and clouds — he governs not in perfect conditions but in complex reality.",["Intellect","Authority","Ethics","Leadership","Clarity","Justice","Truth"],"The master of the mental realm. Upright: lead with clear thinking and ethical authority. Reversed: cold or manipulative use of intelligence.","Use your clarity and authority in service of what is right, not just what is smart.","Intellectual power without ethical grounding is just clever manipulation. Examine your motives.",["Write about a situation that requires clear intellectual leadership from you. What do you actually think?","Where do you need to be more precise and direct in how you communicate?","Write about what ethical leadership looks like to you. Where are you living up to it?"],["Write about a time you used your intelligence to manipulate or dominate. What were you afraid of?","Where is your mental authority being used in ways that are more self-serving than truly helpful?","Write about the relationship between intelligence and wisdom as you understand it."])
];
const PENTACLES=[
mkCard("p1","1","Pentacles","Ace of Pentacles","🪙","Opportunity · Prosperity · New beginning","Earth","Earth","The Ace of Pentacles is the pure gift of material abundance — the seed of prosperity and practical opportunity.","A new practical or financial opportunity arrives. Take hold of it — the material abundance being offered is real.","Missed opportunity, poor financial planning, or a new beginning blocked by practical concerns.","A hand emerges from clouds holding a golden pentacle in a lush garden, an archway of flowers opening onto a path. This is material potential at its most elemental — the gift of practical possibility.",["Opportunity","Prosperity","New beginning","Financial potential","Health","Manifestation","Security"],"The best possible beginning for financial or practical matters. Upright: say yes to the opportunity. Reversed: an opportunity missed or blocked.","The practical opportunity in front of you is real. Take it seriously and take the first concrete step.","What practical matter have you been avoiding that is blocking the opportunity you're hoping for?",["Write about a practical opportunity currently available to you. What would it take to fully commit?","What new venture, financial step, or practical project has been asking to be started?","Write about your relationship with material abundance. Do you let yourself receive it when it arrives?"],["What practical opportunity have you missed or neglected? Is there still a way to recover it?","Write about the practical concern that's blocking your ability to begin something new.","Where does your relationship with money need examination or adjustment?"]),
mkCard("p2","2","Pentacles","Two of Pentacles","🪙","Balance · Adaptability · Juggling priorities","Earth","Jupiter in Capricorn","Two of Pentacles is the dance of practical life — the constant adjustment required to keep multiple responsibilities in motion.","You're managing multiple responsibilities with more grace than you know. Keep the rhythm — don't add more to the juggle.","Financial imbalance, dropping balls, or inability to manage competing demands.","A figure dances while juggling two pentacles contained in an infinity loop. Ships ride rough seas in the background. This is the skilled juggler — managing the ebb and flow of practical life with ease, so long as focus is maintained.",["Balance","Adaptability","Juggling","Priorities","Financial fluctuation","Flexibility","Rhythm"],"The card of skillful balancing. Upright: you're managing the juggle. Reversed: something is starting to slip.","You're doing better with the juggle than you feel. What would help you maintain the rhythm without burning out?","Something is going to drop if you don't make a decision about priorities soon. What matters most?",["Write about the multiple demands currently on your time and energy. How are you managing?","Where do you feel most stretched right now? What would 'sustainable' look like?","Write about adaptability — your relationship with change and fluctuating circumstances."],["Write about what's starting to slip in your balancing act. What needs to be reprioritised?","Where is financial fluctuation causing you stress? What's one practical step toward stability?","Write about a time you took on too much. What were the signs, and what eventually forced you to reorganise?"]),
mkCard("p3","3","Pentacles","Three of Pentacles","🪙","Teamwork · Collaboration · Craft","Earth","Mars in Capricorn","Three of Pentacles is creation's power through practical skill and collaboration — the first real evidence that the work is good.","Collaboration and skilled effort produce visible results. Work with others — your combined abilities exceed what you can do alone.","Disharmony in a team, poor collaboration, or skilled work going unrecognised.","A craftsman works in a cathedral while two figures consult his plans. They are equal contributors — architect, patron, builder — each needed for the work to succeed.",["Teamwork","Collaboration","Skill","Craft","Recognition","Planning","Building"],"The card of skilled collaboration. Upright: expertise and teamwork produce results. Reversed: collaboration breaking down.","This is not the time to work alone. Who has the complementary skills to what you bring?","Where is a collaboration breaking down? Is it a skills mismatch, a communication problem, or something else?",["Write about a collaboration in your life that's working well. What makes it effective?","Where would working with someone else's complementary skills significantly improve what you're trying to do?","Write about your own expertise — the thing you're genuinely skilled at that others recognise."],["Write about a team or collaborative situation that feels dysfunctional. What's at the root of it?","Where is poor planning or miscommunication causing practical problems in your work?","Write about a time your skills or efforts went unrecognised. How did you handle it?"]),
mkCard("p4","4","Pentacles","Four of Pentacles","🪙","Security · Control · Holding on","Earth","Sun in Capricorn","Four of Pentacles is four's stability taken to excess — the security that has become hoarding.","You've built something worth protecting. Just check whether protection has become restriction.","Greed, miserliness, or finally letting go of financial or emotional hoarding.","A figure sits with a pentacle balanced on their head, one clutched to their chest, one underfoot at each heel. They are surrounded by their wealth but imprisoned by it. The city is behind them — life, opportunity — but they face away.",["Security","Control","Hoarding","Financial caution","Fear of loss","Possessiveness","Stability"],"Upright: protect what you have, but check whether you're hoarding. Reversed: tightness, or finally releasing the grip.","There is a difference between financial wisdom and fear masquerading as prudence. Which one is operating?","What would it feel like to release the grip just slightly? What are you afraid you'd lose?",["Write about your relationship with financial security. Does it feel like a foundation or a cage?","Where in your life are you holding on too tightly — to money, to control, to certainty?","Write about what you're most afraid of losing. Is that fear proportionate to the actual risk?"],["Write about an area of your life where you've been financially or emotionally miserly. What drives that?","What would it mean to be more generous — with money, with time, with yourself?","Write about the relationship between security and freedom in your life. Do they feel opposed?"]),
mkCard("p5","5","Pentacles","Five of Pentacles","🪙","Hardship · Poverty · Isolation","Earth","Mercury in Taurus","Five of Pentacles is the disruption of material stability — the moment of genuine hardship.","Hardship or lack is genuinely present. Seek help — there is more warmth available than you're seeing.","Recovery from hardship beginning, or refusing to accept help that is being offered.","Two impoverished figures trudge through snow past a brightly lit stained glass window — warmth and shelter just behind them, but they pass by without noticing. This is hardship compounded by isolation.",["Hardship","Poverty","Isolation","Financial difficulty","Exclusion","Struggle","Help nearby"],"The card of genuine material hardship. Upright: the struggle is real — help exists. Reversed: beginning to recover, or refusing help.","Ask for help. The warmth is there — you have to be willing to go through the door.","Recovery is beginning. What step are you taking toward warmth and stability?",["Write about a current hardship — financial, physical, or emotional. Be honest about how hard it actually is.","Where is help available to you that you haven't been willing to reach for? What stops you?","Write about a time you felt genuinely excluded or left out in the cold. What would have helped?"],["Write about the first signs of recovery from a difficult period. What is changing?","Is there support being offered that you've been too proud or ashamed to accept?","Write about what it took for you to begin to recover from a particularly hard time."]),
mkCard("p6","6","Pentacles","Six of Pentacles","🪙","Generosity · Giving · Receiving","Earth","Moon in Taurus","Six of Pentacles is six's harmony expressed in the material world — the right flow of resources, generosity that creates balance.","A balance of giving and receiving. Be generous — and be willing to receive generosity graciously.","Power imbalance in giving, strings attached to gifts, or charity offered condescendingly.","A wealthy merchant weighs coins on a scale and distributes them to two kneeling beggars. The scale suggests fairness; the distribution suggests generosity. But the power dynamic is visible — who gives and who receives shapes the relationship.",["Generosity","Giving","Receiving","Power dynamics","Charity","Balance","Wealth"],"The card of generosity and giving's power dynamics. Upright: give and receive freely. Reversed: gifts with strings.","Give what you can without keeping score. And let yourself receive with grace.","Examine the power dynamic in a financial or giving relationship. Is generosity genuine or controlling?",["Write about your relationship with giving. Do you give freely? With strings attached? From abundance or from fear?","Write about your relationship with receiving. Is it comfortable? What makes it hard?","Where in your life would genuine generosity — freely given — make a real difference?"],["Write about a time you experienced charity that felt condescending or controlling. What did you need instead?","Where are you attaching strings to your own generosity — consciously or unconsciously?","Write about power and money in your relationships. Where does the flow feel healthy, and where is it distorted?"]),
mkCard("p7","7","Pentacles","Seven of Pentacles","🪙","Patience · Assessment · Long-term investment","Earth","Saturn in Taurus","Seven of Pentacles is the long pause in the middle of a long project, wondering whether the effort is paying off.","The work is in progress — resist the urge to dig it up and check. Patience with the process is part of the process.","Impatience, poor return on investment, or effort that isn't aligned with the goal.","A farmer leans on their hoe, gazing at seven pentacles growing on a lush bush. The work is visible. The harvest isn't yet. This is the mid-project pause — the moment between effort and result where doubt is most dangerous.",["Patience","Assessment","Long-term thinking","Investment","Reward","Progress","Effort"],"The card of patient long-term investment. Upright: trust the process. Reversed: impatience or poor alignment between effort and goal.","You're further along than it feels. Don't abandon the project in the middle of the growth.","Honestly assess whether the effort you're putting in is aligned with the results you actually want.",["Write about a long-term project or goal you're in the middle of. Where are the signs it's working?","Where in your life are you being asked to practice patience with a process that doesn't give quick feedback?","Write about your relationship with delayed gratification. Is it a strength or a struggle?"],["Write about a situation where your effort and intended results feel misaligned. What needs to change?","Where are you being impatient with something that genuinely needs more time?","Write about a project or investment that hasn't paid off the way you hoped. What did you learn?"]),
mkCard("p8","8","Pentacles","Eight of Pentacles","🪙","Mastery · Dedication · Craft","Earth","Sun in Virgo","Eight of Pentacles is the joy of becoming excellent — the committed apprentice who finds meaning in patient, repetitive work.","You are in the zone of dedicated practice. Mastery comes through consistent, focused effort — stay in it.","Perfectionism, lack of focus, or going through the motions without real engagement.","A craftsman works diligently on a pentacle, six completed ones hanging around them, an eighth in progress. The city is in the distance — they are not there yet. This is the solitary devotion of the one who loves the work itself.",["Mastery","Craft","Dedication","Practice","Skill development","Focus","Diligence"],"The card of the dedicated apprentice. Upright: mastery is the accumulation of these moments. Reversed: perfectionism blocking progress.","The boring, repetitive part of getting good at something is not the obstacle — it is the path.","Are you going through the motions, or are you genuinely present to the work? There is a difference.",["Write about a skill or craft you're currently developing. What does dedicated practice look like for you?","Where do you feel most in a state of 'flow' — fully absorbed in what you're doing?","Write about the satisfaction of getting genuinely good at something through consistent effort."],["Write about the role perfectionism plays in your creative or professional work. Where does it help and where does it hurt?","Where are you going through the motions without genuine engagement? What would it take to re-engage?","Write about a skill you've abandoned partway through developing. What happened?"]),
mkCard("p9","9","Pentacles","Nine of Pentacles","🪙","Abundance · Self-sufficiency · Refinement","Earth","Venus in Virgo","Nine of Pentacles is the garden of one's own creation — the self-made security, the pleasure of what has been built by one's own hand.","You have created something genuinely good through your own effort. Enjoy the fruits — you've earned them.","Overwork at the expense of enjoyment, or material abundance masking inner emptiness.","An elegant woman stands in a garden of vines heavy with grapes, a hooded falcon on her wrist. Pentacles grow around her like fruit. She is solitary but not lonely — this is the satisfaction of self-sufficiency, of having built something beautiful and real.",["Abundance","Self-sufficiency","Independence","Refinement","Achievement","Luxury","Enjoyment"],"The card of earned self-sufficiency. Upright: enjoy what you've built. Reversed: success without satisfaction.","You've built something real. Stop working long enough to actually enjoy it.","Is the abundance you've created actually making you happy? If not, what's missing?",["Write about something you've built or achieved through your own sustained effort. Allow yourself to feel proud of it.","What does genuine self-sufficiency feel like to you? Where do you have it?","Write about a pleasure or luxury you enjoy that you've earned through your own work."],["Write about the relationship between your work and your enjoyment of life. Are you working to live or living to work?","Where has achievement become hollow? What are you working toward that you actually want?","Write about a time you succeeded at something but found the success unsatisfying. What did it reveal?"]),
mkCard("p10","10","Pentacles","Ten of Pentacles","🪙","Legacy · Family · Long-term security","Earth","Mercury in Virgo","Ten of Pentacles is the completion of the material suit — the multigenerational abundance, the legacy.","Long-term security and the satisfaction of something built to last. Legacy, family, and enduring abundance are present.","Family conflict over money, short-term thinking, or the appearance of wealth masking instability.","An old man sits in an archway watching his family — children, adults, dogs — in the courtyard of a prosperous home. Ten pentacles are arranged in the pattern of the Tree of Life. This is the deepest stability — wealth that is also belonging.",["Legacy","Family","Long-term security","Inheritance","Belonging","Community","Enduring wealth"],"The card of lasting material and familial abundance. Upright: long-term stability and legacy. Reversed: family conflict or surface wealth hiding instability.","Think about what you're building not just for now but for the long term — what legacy are you creating?","Check whether the appearance of stability is actually hiding a more fragile reality. What needs addressing?",["Write about the legacy you want to leave — financially, in relationships, in values, and impact.","What does long-term security mean to you? How close are you to it?","Write about what 'family' means to you — the one you were born into, the one you've chosen, or the one you're building."],["Write about a family conflict over money, values, or inheritance. What's really underneath it?","Where are you thinking short-term in a situation that requires long-term thinking?","Write about the difference between the appearance of stability and actual stability in your life."]),
mkCard("ppg","Pg","Pentacles","Page of Pentacles","🪙","Ambition · Diligence · New skills","Earth","Earth of Earth","The Page of Pentacles is the student of the material world — earnest, hardworking, curious about how things work.","Approach your work with fresh curiosity and diligence. A new practical opportunity or learning begins.","Poor planning, lack of follow-through, or ambition without the discipline to match.","A Page stands in a flowering field, gazing intently at a pentacle held before them as if studying it. This is the serious student — methodical, earnest, willing to put in the time.",["Diligence","Ambition","Study","Practical skills","Earnestness","New learning","Potential"],"The earnest student of the material world. Upright: study and practice with genuine diligence. Reversed: poor planning or lack of follow-through.","Approach this with more patience and diligence than you think you need. The foundation you build now matters.","The gap between your ambitions and your follow-through is the thing to examine. What would it take to close it?",["What practical skill or knowledge are you currently working to develop? What does your study look like?","Write about your relationship with patience and diligence in your work.","Where do you need to slow down and be more methodical in how you approach something?"],["Write about the gap between your ambitions and your follow-through in a specific area of your life.","Where does poor planning consistently cause you practical problems?","Write about a time you failed to execute on something you were excited about. What happened in the gap?"]),
mkCard("pkn","Kn","Pentacles","Knight of Pentacles","🪙","Reliability · Patience · Methodical progress","Earth","Fire of Earth","The Knight of Pentacles is the steadiest of the Knights — methodical, reliable, patient, advancing slowly but without deviation.","Slow, steady, consistent effort will win this one. Be reliable, keep your commitments, and stay the course.","Stubbornness, dullness, or relentless work without the ability to adapt.","A Knight sits on a heavy, stationary horse in a ploughed field, holding a pentacle for inspection. Unlike the Knight of Wands who charges, this Knight is still — assessing, prepared, reliable.",["Reliability","Patience","Methodical approach","Diligence","Steadiness","Practical effort","Commitment"],"The steadiest of the Knights. Upright: be reliable and patient. Reversed: too rigid, or reliable to the point of dullness.","This is not the time for inspiration or speed. It's the time for showing up, exactly as promised, every day.","Reliability without flexibility can become a different kind of failure. Where do you need to adapt?",["Write about a situation that requires patient, consistent, methodical effort from you. How are you showing up?","Where in your life are you being the most reliably consistent? What has that built?","Write about the difference between slow progress and no progress. Which one is happening?"],["Where is your stubbornness or inflexibility getting in the way of real progress?","Write about the relationship between reliability and rigidity. Where does one become the other for you?","What would 'adapting your approach' look like in a situation where you've been stuck in one method?"]),
mkCard("pqu","Qu","Pentacles","Queen of Pentacles","🪙","Nurture · Practicality · Abundance","Earth","Water of Earth","The Queen of Pentacles is the most nurturing card in the deck — practical care expressed at its warmest, abundance shared generously.","Create warmth and abundance for yourself and those around you. Practical nurturing is a profound form of love.","Overwork, domestic overwhelm, or nurturing everyone except yourself.","A Queen sits on a flower-carved throne with a lush garden around her, holding a pentacle in her lap and gazing at it tenderly. A rabbit leaps nearby. She is fully in her element: practical, warm, capable.",["Nurture","Practicality","Abundance","Warmth","Capability","Generosity","Groundedness"],"The warmest card in the earthly suit. Upright: create practical warmth and abundance. Reversed: overextended nurturing.","The care you bring to practical matters is a form of love. Give it fully — and turn some of it toward yourself.","You can't nurture others from a place of depletion. When did you last do something purely for your own restoration?",["Write about the practical ways you care for the people you love. What does that generosity mean?","Where in your life are you at your most capable and grounded? Write about what that feels like.","Write about your home or domestic life. What does it offer you, and what does it need from you?"],["Write about the last time you felt genuinely overwhelmed by caregiving or domestic demands. What do you need?","Where are you over-extending yourself in the service of others at the cost of your own wellbeing?","Write about what would need to change for you to feel genuinely nurtured — not just functional."]),
mkCard("pki","Ki","Pentacles","King of Pentacles","🪙","Wealth · Reliability · Practical wisdom","Earth","Air of Earth","The King of Pentacles is the mastery of the material world — not just in wealth but in the wisdom of how to create, sustain, and share it.","Lead with practical wisdom and generosity. Your capacity to create material security is a gift to be shared.","Materialism, stubbornness, or wealth used as control.","A King sits on a throne carved with bulls — Taurus, the earth sign — surrounded by vines and flowers, holding a sceptre and a pentacle. He is the abundance of the earth in its most mature form — wealthy, generous, deeply rooted.",["Wealth","Practicality","Reliability","Generosity","Mastery","Security","Leadership"],"The master of the material world. Upright: lead with practical wisdom and generosity. Reversed: materialism or using wealth to control.","Your practical wisdom is a real resource. Share it generously rather than hoarding it.","Check whether your relationship with money and material security is serving your life — or running it.",["Write about your own version of practical wisdom — the things you've learned about how to make things work.","Where in your life do you demonstrate the most reliable, grounded leadership?","Write about your relationship with wealth — not just money but the full sense of material wellbeing."],["Write about the way money or material security has become a controlling factor in your life or relationships.","Where is stubbornness around practical matters preventing necessary change?","Write about the difference between practical wisdom and materialism as you've seen them play out."])

  document.getElementById('view-daily').style.display=tab==='daily'?'flex':'none';

  document.getElementById('tab-daily').classList.toggle('active',tab==='daily');
  document.getElementById('tab-browse').classList.toggle('active',tab==='browse');
  if(tab==='browse')renderBrowse();
}
function getDateCard(){const d=new Date();const seed=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();return{card:ALL_CARDS[seed%ALL_CARDS.length],reversed:(seed%7)<2};}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function populateDailyCard(card,reversed){
  currentCard=card;currentReversed=reversed;viewOrientation=reversed;
  const label=card.arcanaLabel||(card.suit==='major'?`Major Arcana · ${card.num}`:`${cap(card.suit)} · ${card.num}`);
  document.getElementById('card-arcana').textContent=label;
  document.getElementById('card-symbol').textContent=card.symbol;
  document.getElementById('card-title').textContent=card.name;
  document.getElementById('card-keywords').textContent=card.keywords;
  updateDailyMeaning();
}
function updateDailyMeaning(){
  const rev=viewOrientation;
  document.getElementById('card-meaning-front').textContent=rev?currentCard.reversed:currentCard.upright;
  document.getElementById('reversed-pill').style.display=rev?'block':'none';
  document.getElementById('btn-orientation').textContent=rev?'↑ Show Upright':'↓ Show Reversed';
  populateCorrPanel(currentCard);
  document.getElementById('lore-symbolism').textContent=currentCard.symbolism;
  renderChips('lore-themes',currentCard.themes);
  document.getElementById('lore-in-reading').textContent=currentCard.in_reading;
  document.getElementById('advice-text').textContent=rev?currentCard.advice_reversed:currentCard.advice_upright;
  renderPrompts('prompt-list',rev?currentCard.prompts_reversed:currentCard.prompts_upright);
}
function populateCorrPanel(card){
  const g=document.getElementById('corr-grid');
  const num=card.num||card.arcanaLabel;
  const numNote=card.numNote||'';
  g.innerHTML=`<div class="corr-item"><div class="corr-label">Element</div><div class="corr-value">${card.element||'—'}</div></div><div class="corr-item"><div class="corr-label">Astrology</div><div class="corr-value">${card.astro||'—'}</div></div>${numNote?`<div class="corr-item corr-full"><div class="corr-label">Numerology · ${num}</div><div class="num-note">${numNote}</div></div>`:''}`;
}
function renderChips(id,arr){const el=document.getElementById(id);el.innerHTML='';(arr||[]).forEach(t=>{const s=document.createElement('span');s.className='chip';s.textContent=t;el.appendChild(s);});}
function renderPrompts(id,arr){const ul=document.getElementById(id);ul.innerHTML='';(arr||[]).forEach((p,i)=>{const li=document.createElement('li');li.innerHTML=`<span class="prompt-num">${i+1}.</span><span class="prompt-text">${p}</span>`;ul.appendChild(li);});}
function showPanels(){['panel-corr','panel-lore','panel-advice','panel-prompts'].forEach((id,i)=>{setTimeout(()=>document.getElementById(id).classList.add('visible'),150+i*180);});document.getElementById('btn-orientation').classList.remove('hidden-ctrl');document.getElementById('btn-draw').classList.remove('hidden-ctrl');}
function hidePanels(){['panel-corr','panel-lore','panel-advice','panel-prompts'].forEach(id=>document.getElementById(id).classList.remove('visible'));}
function toggleFlip(){
  const inner=document.getElementById('card-inner');
  if(!revealed){revealed=true;inner.classList.add('revealed');showPanels();}
  else{if(inner.classList.contains('revealed')){inner.classList.remove('revealed');hidePanels();}else{inner.classList.add('revealed');showPanels();}}
}
function toggleOrientation(){viewOrientation=!viewOrientation;updateDailyMeaning();}
function drawRandom(){
  revealed=false;
  document.getElementById('card-inner').classList.remove('revealed');
  hidePanels();
  document.getElementById('btn-orientation').classList.add('hidden-ctrl');
  document.getElementById('btn-draw').classList.add('hidden-ctrl');
  populate(ALL_CARDS[Math.floor(Math.random()*ALL_CARDS.length)],Math.random()<0.25);
}
function populate(card,reversed){populateDailyCard(card,reversed);}
function renderBrowse(){
  const container=document.getElementById('browse-content');
  if(container.innerHTML)return;
  const sections=[{title:'Major Arcana',cards:MAJOR},{title:'Wands',cards:WANDS},{title:'Cups',cards:CUPS},{title:'Swords',cards:SWORDS},{title:'Pentacles',cards:PENTACLES}];
  container.innerHTML='';
  sections.forEach(sec=>{
    const div=document.createElement('div');div.className='suit-section';
    div.innerHTML=`<div class="suit-title">${sec.title}</div><div class="cards-grid"></div>`;
    container.appendChild(div);
    const grid=div.querySelector('.cards-grid');
    sec.cards.forEach(card=>{
      const el=document.createElement('div');el.className='grid-card';
      el.innerHTML=`<div class="grid-card-symbol">${card.symbol}</div><div class="grid-card-name">${card.name}</div><div class="grid-card-sub">${card.num}</div>`;
      el.onclick=()=>openDetail(card);grid.appendChild(el);
    });
  });
}
function openDetail(card){detailCard=card;detailReversed=false;renderDetailCard();document.getElementById('detail-overlay').style.display='block';document.body.style.overflow='hidden';}
function closeDetail(){document.getElementById('detail-overlay').style.display='none';document.body.style.overflow='';}
function setDetailOrientation(rev){detailReversed=rev;document.getElementById('det-btn-up').classList.toggle('active',!rev);document.getElementById('det-btn-rev').classList.toggle('active',rev);renderDetailCard();}
function renderDetailCard(){
  const card=detailCard;const rev=detailReversed;
  const label=card.arcanaLabel||(card.suit==='major'?`Major Arcana · ${card.num}`:`${cap(card.suit)} · ${card.num}`);
  document.getElementById('det-arcana').textContent=label;
  document.getElementById('det-symbol').textContent=card.symbol;
  document.getElementById('det-title').textContent=card.name;
  document.getElementById('det-keywords').textContent=card.keywords;
  document.getElementById('det-meaning').textContent=rev?card.reversed:card.upright;
  document.getElementById('det-pill').style.display=rev?'block':'none';
  const numNote=card.numNote||'';const num=card.num||'';
  document.getElementById('detail-panels').innerHTML=`
    <div class="panel visible"><div class="panel-label">Correspondences</div><div class="corr-grid"><div class="corr-item"><div class="corr-label">Element</div><div class="corr-value">${card.element||'—'}</div></div><div class="corr-item"><div class="corr-label">Astrology</div><div class="corr-value">${card.astro||'—'}</div></div>${numNote?`<div class="corr-item corr-full"><div class="corr-label">Numerology · ${num}</div><div class="num-note">${numNote}</div></div>`:''}</div></div>
    <div class="panel visible"><div class="panel-label">About this card</div><div class="lore-section"><div class="lore-heading">Symbolism &amp; imagery</div><div class="lore-text">${card.symbolism||''}</div></div><div class="lore-section"><div class="lore-heading">Core themes</div><div class="theme-chips">${(card.themes||[]).map(t=>`<span class="chip">${t}</span>`).join('')}</div></div><div class="lore-section"><div class="lore-heading">In a reading</div><div class="lore-text">${card.in_reading||''}</div></div></div>
    <div class="panel visible"><div class="panel-label">${rev?'Reversed':'Upright'} invitation</div><div class="advice-wrap"><div class="advice-text">${rev?card.advice_reversed:card.advice_upright}</div></div></div>
    <div class="panel visible"><div class="panel-label">Journal prompts</div><ul class="prompt-list">${(rev?card.prompts_reversed:card.prompts_upright||[]).map((p,i)=>`<li><span class="prompt-num">${i+1}.</span><span class="prompt-text">${p}</span></li>`).join('')}</ul></div>
  `;
}
document.getElementById('card-scene').addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleFlip();}});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail();});
applyTheme();
const d=new Date();
document.getElementById('date-line').textContent=d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
const{card,reversed}=getDateCard();
populateDailyCard(card,reversed);
</script>
</body>
</html>
